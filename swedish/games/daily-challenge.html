<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Challenge · Swedish</title>
<script src="../flashcards.js"></script>
<style>
:root {
  --bg:#faf6f0; --surface:#ffffff; --surface2:#f2ece2;
  --border:#e8ddd0; --text:#2c1f12; --muted:#8a7a68;
  --blue:#b85430; --green:#3d6e30; --red:#b03428; --yellow:#a06820;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 2.5rem 1rem;
}
h1 { font-size: 1rem; font-weight: 600; color: var(--muted);
  letter-spacing: .12em; text-transform: uppercase; margin-bottom: 2rem; }
.pips { display: flex; gap: .5rem; margin-bottom: 2rem; }
.pip { width: 2.5rem; height: .3rem; border-radius: 9999px; background: var(--surface2); transition: background .3s; }
.pip.done { background: var(--green); }
.pip.active { background: var(--blue); }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 1rem; padding: 3rem 2rem 2.5rem;
  width: 100%; max-width: 500px; text-align: center; margin-bottom: 1.5rem;
}
.swedish { font-size: 2.8rem; font-weight: 700; letter-spacing: -.01em; margin-bottom: .4rem; }
.badge { font-size: .72rem; color: var(--muted); opacity: .55; text-transform: uppercase; letter-spacing: .08em; }
.row { display: flex; gap: .5rem; width: 100%; max-width: 500px; margin-bottom: .75rem; }
input {
  flex: 1; background: var(--surface); border: 1.5px solid var(--border);
  border-radius: .5rem; padding: .75rem 1rem; color: var(--text);
  font-size: 1rem; outline: none; transition: border-color .15s;
}
input:focus { border-color: var(--blue); }
input:disabled { opacity: .5; }
.btn {
  background: var(--blue); color: var(--bg); border: none;
  border-radius: .5rem; padding: .75rem 1.4rem; font-size: 1rem;
  font-weight: 700; cursor: pointer; transition: opacity .15s; white-space: nowrap;
}
.btn:hover { opacity: .85; }
.btn:disabled { opacity: .35; cursor: default; }
.btn-ghost { background: var(--surface2); color: var(--text); }
.result {
  width: 100%; max-width: 500px; padding: .9rem 1.1rem;
  border-radius: .6rem; margin-bottom: .75rem; display: none;
  font-size: .95rem; line-height: 1.5;
}
.result.correct { background: #2d3f2d; border: 1px solid var(--green); }
.result.wrong   { background: #3f2d2d; border: 1px solid var(--red); }
.result-label { font-weight: 700; margin-bottom: .3rem; }
.result.correct .result-label { color: var(--green); }
.result.wrong   .result-label { color: var(--red); }
.result-answer { color: var(--muted); font-size: .88rem; }
/* end screen */
.end { display: none; text-align: center; max-width: 500px; }
.score-num { font-size: 5rem; font-weight: 700; color: var(--blue); line-height: 1; }
.score-sub { color: var(--muted); margin-bottom: .3rem; font-size: 1.1rem; }
.score-msg { color: var(--muted); font-size: .9rem; margin-bottom: 2rem; min-height: 1.4em; }
.date-label { color: var(--muted); opacity: .45; font-size: .75rem; margin-bottom: 2.5rem; letter-spacing: .06em; }
.nav-home { display:block; width:100%; max-width:600px; font-size:.75rem; color:var(--muted); text-decoration:none; letter-spacing:.06em; margin-bottom:1.25rem; opacity:.7; transition:color .15s, opacity .15s; }
.nav-home:hover { color:var(--blue); opacity:1; }
.setup-err { background:#3f2d2d; border:1px solid var(--red); border-radius:.5rem; padding:.65rem 1rem; font-size:.85rem; color:var(--red); margin-top:.75rem; display:none; }
</style>
</head>
<body>
<nav style="background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 1.25rem;height:48px;display:flex;align-items:center;gap:1rem;
  position:sticky;top:0;z-index:100;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <a href="../index.html" style="font-weight:700;font-size:.875rem;color:var(--text);text-decoration:none;">
    🫎 Swedish
  </a>
  <span style="color:var(--border)">›</span>
  <span style="font-size:.875rem;color:var(--muted)">Daily Challenge</span>
</nav>

<a href="index.html" class="nav-home" id="navHome">← All tools</a>
<h1>Daily Challenge</h1>
<div id="sourceBadge" style="display:none;font-size:.72rem;color:var(--blue);text-transform:uppercase;letter-spacing:.1em;margin-top:-.75rem;margin-bottom:1.5rem;"></div>
<div class="setup-err" id="setupErr"></div>
<div class="pips" id="pips"></div>

<div id="main">
  <div class="card">
    <div class="swedish" id="sw"></div>
    <div class="badge" id="badge"></div>
  </div>
  <div class="row">
    <input id="inp" type="text" placeholder="English translation…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="btn" id="checkBtn">Check</button>
  </div>
  <div class="result" id="result">
    <div class="result-label" id="rlabel"></div>
    <div class="result-answer" id="ranswer"></div>
  </div>
  <button class="btn btn-ghost" id="nextBtn" style="display:none;width:100%;max-width:500px">Next →</button>
</div>

<div class="end" id="end">
  <div class="date-label" id="dateLabel"></div>
  <div class="score-num" id="scoreNum"></div>
  <div class="score-sub" id="scoreSub">out of 5 correct</div>
  <div class="score-msg" id="scoreMsg"></div>
  <button class="btn" onclick="init()">New challenge</button>
</div>

<script>
let N = 5;
let cards = [], cur = 0, score = 0, checked = false;

/* ── Source filter ──────────────────────────────────────────────────────── */
function filteredPool() {
  const src = new URLSearchParams(location.search).get('source') || 'all';
  const base = FLASHCARDS.filter(c => c.english.trim());
  if (src === 'all') return base;
  if (src === 'my-words') return base.filter(c => c.source !== 'anki');
  return base.filter(c => c.source === src);
}
function updateSourceBadge() {
  const src = new URLSearchParams(location.search).get('source');
  const el = document.getElementById('sourceBadge');
  if (!src || src === 'all') { el.style.display = 'none'; return; }
  el.style.display = 'block';
  el.textContent = src === 'my-words' ? 'My words' : src;
}

/* ── Seeded RNG ─────────────────────────────────────────────────────────── */
function rng(seed) {
  let s = seed >>> 0;
  return () => { s = Math.imul(s ^ s >>> 13, s ^ s << 17) ^ s >>> 5; return (s >>> 0) / 4294967296; };
}
function todaySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

/* ── Answer checking ────────────────────────────────────────────────────── */
function core(eng) {
  return eng.replace(/\*[^*]+\*/g, '')
            .split(' — ')[0].split(';')[0].split('(')[0].split('[')[0]
            .replace(/^\d+\.\s*/, '').trim();
}
function norm(s) {
  return s.toLowerCase().replace(/^(the|a|an)\s+/, '')
          .replace(/[^a-zåäö\s\-]/g, '').replace(/\s+/g, ' ').trim();
}
function check(input, eng) {
  const u = norm(input), c = norm(core(eng));
  if (!u) return false;
  if (u === c) return true;
  for (const part of c.split(/[,\/]/)) if (norm(part.trim()) === u) return true;
  if (u.length >= 4 && c.includes(u)) return true;
  return false;
}

/* ── UI helpers ─────────────────────────────────────────────────────────── */
function renderPips() {
  const el = document.getElementById('pips');
  el.innerHTML = Array.from({length: N}, (_, i) =>
    `<div class="pip${i < cur ? ' done' : i === cur ? ' active' : ''}"></div>`
  ).join('');
}
function showCard() {
  const c = cards[cur];
  document.getElementById('sw').textContent = c.swedish;
  document.getElementById('badge').textContent = c.source !== 'anki' ? c.source : '';
  const inp = document.getElementById('inp');
  inp.value = ''; inp.disabled = false; inp.focus();
  document.getElementById('result').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('checkBtn').style.display = '';
  checked = false;
  renderPips();
}
function doCheck() {
  if (checked) return;
  const c = cards[cur];
  const inp = document.getElementById('inp');
  const ok = check(inp.value.trim(), c.english);
  if (ok) score++;
  checked = true;
  inp.disabled = true;
  document.getElementById('checkBtn').style.display = 'none';
  const res = document.getElementById('result');
  res.className = 'result ' + (ok ? 'correct' : 'wrong');
  res.style.display = 'block';
  document.getElementById('rlabel').textContent = ok ? '✓ Correct' : '✗ Not quite';
  document.getElementById('ranswer').textContent = c.english;
  document.getElementById('nextBtn').style.display = 'block';
}
function doNext() {
  cur++;
  if (cur >= N) showEnd(); else showCard();
}
function showEnd() {
  document.getElementById('main').style.display = 'none';
  document.getElementById('pips').style.display = 'none';
  const end = document.getElementById('end');
  end.style.display = 'block';
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreSub').textContent = `out of ${N} correct`;
  const msgs = ['Keep at it!', 'Good effort!', 'Solid work.', 'Great job!', 'Perfect!'];
  document.getElementById('scoreMsg').textContent = score === N ? 'Perfect score!' : msgs[score] || '';
  const d = new Date();
  document.getElementById('dateLabel').textContent =
    d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
}

/* ── Init ───────────────────────────────────────────────────────────────── */
function init() {
  cur = 0; score = 0;
  updateSourceBadge();
  const r = rng(todaySeed());
  const pool = filteredPool();
  const errEl = document.getElementById('setupErr');
  if (!pool.length) {
    errEl.textContent = 'No cards for this source. Use ← All tools to pick a different topic.';
    errEl.style.display = 'block';
    document.getElementById('pips').style.display = 'none';
    document.getElementById('main').style.display = 'none';
    return;
  }
  errEl.style.display = 'none';
  N = Math.min(5, pool.length);
  const shuffled = [...pool];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(r() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  cards = shuffled.slice(0, N);
  document.getElementById('main').style.display = '';
  document.getElementById('pips').style.display = '';
  document.getElementById('end').style.display = 'none';
  showCard();
}

document.getElementById('checkBtn').addEventListener('click', doCheck);
document.getElementById('nextBtn').addEventListener('click', doNext);
document.getElementById('inp').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !checked) { doCheck(); e.stopPropagation(); }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && checked) doNext();
});

init();
(function(){var s=new URLSearchParams(location.search).get('source');if(s)document.getElementById('navHome').href='index.html?source='+encodeURIComponent(s);})();
</script>

<script src="../../domains.js"></script>
<script src="../../sr/engine.js"></script>
<script src="../../sync.js"></script>
<script>
function swAddXP(amount) {
  if (amount <= 0) return;
  if (typeof engine !== 'undefined') engine.addXP(amount, 'swedish');
  if (typeof sync   !== 'undefined' && sync.isConfigured()) sync.push().catch(function(){});
  // Toast
  var el = document.getElementById('xp-toast-sw');
  if (!el) {
    el = document.createElement('div');
    el.id = 'xp-toast-sw';
    el.style.cssText = 'position:fixed;bottom:1.5rem;right:1rem;background:#b85430;color:#fff;'
      + 'padding:.45rem .9rem;border-radius:8px;font-size:.85rem;font-weight:700;'
      + 'opacity:0;transition:opacity .25s;pointer-events:none;z-index:9999;';
    document.body.appendChild(el);
  }
  el.textContent = '+' + amount + ' XP';
  el.style.opacity = '1';
  setTimeout(function() { el.style.opacity = '0'; }, 2200);
}
</script>
</body>
</html>
