<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Adjective Agreement · Swedish</title>
<style>
:root { --bg:#faf6f0; --surface:#ffffff; --surface2:#f2ece2; --border:#e8ddd0; --text:#2c1f12; --muted:#8a7a68; --blue:#b85430; --green:#3d6e30; --red:#b03428; }
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:2.5rem 1rem; }
h1 { font-size:1rem; font-weight:600; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; margin-bottom:.5rem; }
.subtitle { font-size:.8rem; color:var(--muted); opacity:.6; margin-bottom:2rem; }
.topbar { display:flex; justify-content:space-between; align-items:center; width:100%; max-width:480px; margin-bottom:1.5rem; font-size:.85rem; color:var(--muted); }
.card { background:var(--surface); border:1px solid var(--border); border-radius:1rem; padding:2.5rem 2rem; width:100%; max-width:480px; text-align:center; margin-bottom:1.2rem; }
.context-label { font-size:.75rem; text-transform:uppercase; letter-spacing:.1em; color:var(--blue); margin-bottom:.8rem; }
.frame { font-size:1.6rem; line-height:1.6; }
.blank { display:inline-block; min-width:4rem; border-bottom:2px solid var(--blue); color:var(--blue); font-style:italic; }
.en-gloss { font-size:.85rem; color:var(--muted); opacity:.7; margin-top:.5rem; }
.base-adj { font-size:.9rem; color:var(--muted); margin-top:.5rem; }
.row { display:flex; gap:.5rem; width:100%; max-width:480px; margin-bottom:.75rem; }
input[type=text] { flex:1; background:var(--surface); border:1.5px solid var(--border); border-radius:.5rem; padding:.75rem 1rem; color:var(--text); font-size:1.1rem; outline:none; transition:border-color .15s; }
input[type=text]:focus { border-color:var(--blue); }
input[type=text]:disabled { opacity:.4; }
.btn { background:var(--blue); color:var(--bg); border:none; border-radius:.5rem; padding:.75rem 1.4rem; font-size:1rem; font-weight:700; cursor:pointer; transition:opacity .15s; }
.btn:hover { opacity:.85; }
.btn-ghost { background:var(--surface2); color:var(--text); }
.result { width:100%; max-width:480px; padding:.9rem 1.1rem; border-radius:.6rem; margin-bottom:.75rem; display:none; }
.result.correct { background:#2d3f2d; border:1px solid var(--green); }
.result.wrong { background:#3f2d2d; border:1px solid var(--red); }
.rlbl { font-weight:700; margin-bottom:.3rem; }
.result.correct .rlbl { color:var(--green); }
.result.wrong .rlbl { color:var(--red); }
.rans { color:var(--muted); font-size:.88rem; }
.rtip { color:var(--muted); font-size:.82rem; margin-top:.4rem; line-height:1.5; }
.rule-box { background:var(--surface2); border:1px solid var(--border); border-radius:.5rem; padding:.8rem 1rem; font-size:.82rem; color:var(--muted); line-height:1.6; width:100%; max-width:480px; margin-bottom:1.5rem; }
.rule-box strong { color:var(--text); }
.nav-home { display:block; width:100%; max-width:600px; font-size:.75rem; color:var(--muted); text-decoration:none; letter-spacing:.06em; margin-bottom:1.25rem; opacity:.7; transition:color .15s, opacity .15s; }
.nav-home:hover { color:var(--blue); opacity:1; }
.end { display:none; text-align:center; max-width:480px; margin-top:1rem; }
.score-big { font-size:5rem; font-weight:700; color:var(--blue); line-height:1; }
.score-sub { color:var(--muted); margin-bottom:2rem; }
.btn-hear {
  background:none; border:1px solid var(--border); border-radius:8px;
  color:var(--muted); font-size:.8rem; padding:.3rem .75rem; cursor:pointer;
  display:inline-flex; align-items:center; gap:.3rem;
  transition:border-color .15s, color .15s; margin-top:.5rem;
}
.btn-hear:hover { border-color:var(--blue); color:var(--blue); }
</style>
</head>
<body>
<nav style="background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 1.25rem;height:48px;display:flex;align-items:center;gap:1rem;
  position:sticky;top:0;z-index:100;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <a href="../index.html" style="font-weight:700;font-size:.875rem;color:var(--text);text-decoration:none;">
    🫎 Swedish
  </a>
  <span style="color:var(--border)">›</span>
  <span style="font-size:.875rem;color:var(--muted)">Adjective Agreement</span>
</nav>

<a href="index.html" class="nav-home">← All tools</a>
<h1>Adjective Agreement</h1>
<div class="subtitle">Type the correct form of the adjective</div>

<div class="rule-box">
  <strong>Quick reminder:</strong> indefinite en-word → base &nbsp;|&nbsp; indefinite ett-word → base+<strong>t</strong> &nbsp;|&nbsp; definite or plural → base+<strong>a</strong>
</div>

<div id="game">
<div class="topbar">
  <span id="counter">1 / ?</span>
  <span id="scoreBar">0 correct</span>
</div>

<div class="card">
  <div class="context-label" id="ctx"></div>
  <div class="frame" id="frame"></div>
  <div class="en-gloss" id="enGloss"></div>
  <div class="base-adj" id="baseAdj"></div>
</div>

<div class="row">
  <input type="text" id="inp" placeholder="Adjective form…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <button class="btn" id="checkBtn">Check</button>
</div>
<div class="result" id="result">
  <div class="rlbl" id="rlbl"></div>
  <div class="rans" id="rans"></div>
  <div class="rtip" id="rtip"></div>
</div>
<button class="btn btn-ghost" id="nextBtn" style="display:none;width:100%;max-width:480px">Next →</button>
</div>

<div class="end" id="end">
  <div class="score-big" id="sBig"></div>
  <div class="score-sub" id="sSub"></div>
  <button class="btn" onclick="startRound()">Play again</button>
</div>

<script>
// Items: [context label, frame with ___ , correct answer, base form, rule explanation, English gloss]
const ITEMS = [
  // STOR (big)
  ["Indefinite en-word",   "en ___ bil",           "stor",   "stor",   "en-word: base form (stor)",                               "a ___ car"],
  ["Indefinite ett-word",  "ett ___ hus",          "stort",  "stor",   "ett-word: base + t (stor → stort)",                      "a ___ house"],
  ["Definite en-word",     "den ___ bilen",        "stora",  "stor",   "definite: base + a (stora)",                             "the ___ car"],
  ["Definite ett-word",    "det ___ huset",        "stora",  "stor",   "definite: base + a (stora)",                             "the ___ house"],
  ["Plural",               "___ hus och bilar",    "stora",  "stor",   "plural: base + a (stora)",                               "___ houses and cars"],
  ["Predicative (en)",     "Bilen är ___.",         "stor",   "stor",   "predicative en-word: base form",                         "The car is ___."],
  ["Predicative (ett)",    "Huset är ___.",         "stort",  "stor",   "predicative ett-word: base + t",                         "The house is ___."],
  ["Predicative (pl)",     "Bilarna är ___.",       "stora",  "stor",   "predicative plural: base + a",                           "The cars are ___."],
  // NY (new) — stressed vowel → -tt
  ["Indefinite en-word",   "en ___ telefon",       "ny",     "ny",     "en-word: base form (ny)",                                "a ___ phone"],
  ["Indefinite ett-word",  "ett ___ jobb",         "nytt",   "ny",     "ett-word: ny → nytt (double t after stressed vowel)",     "a ___ job"],
  ["Definite / plural",    "den ___ telefonen",    "nya",    "ny",     "definite: ny → nya",                                     "the ___ phone"],
  ["Plural",               "___ idéer",            "nya",    "ny",     "plural: ny → nya",                                       "___ ideas"],
  // GAMMAL (old) — irregular
  ["Indefinite en-word",   "en ___ man",           "gammal", "gammal", "en-word: base form (gammal)",                            "a ___ man"],
  ["Indefinite ett-word",  "ett ___ hus",          "gammalt","gammal", "ett-word: gammal → gammalt",                             "a ___ house"],
  ["Definite / plural",    "den ___ mannen",       "gamle",  "gammal", "definite masc.: gammal → gamle (or gamla, both ok)",     "the ___ man"],
  ["Definite / plural",    "___ människor",        "gamla",  "gammal", "plural: gammal → gamla",                                 "___ people"],
  // RÖRD (moved/emotional) — ends in -d → -tt
  ["Indefinite ett-word",  "ett ___ barn (rörd)",  "rört",   "rörd",   "ett-word: -d ending → -tt (rörd → rört)",               "a ___ child"],
  ["Definite / plural",    "det ___ barnet (rörd)","rörda",  "rörd",   "definite: rörd → rörda",                                "the ___ child"],
  // LITEN (little) — irregular
  ["Indefinite en-word",   "en ___ katt",          "liten",  "liten",  "en-word: base form (liten)",                            "a ___ cat"],
  ["Indefinite ett-word",  "ett ___ barn",         "litet",  "liten",  "ett-word: liten → litet",                               "a ___ child"],
  ["Definite",             "den ___ katten",       "lilla",  "liten",  "definite sg: liten → lilla (irregular)",                "the ___ cat"],
  ["Plural",               "___ katter",           "små",    "liten",  "plural: liten → små (suppletive irregular)",            "___ cats"],
  // GLAD (happy) — -d → -tt
  ["Indefinite en-word",   "en ___ flicka",        "glad",   "glad",   "en-word: base form (glad)",                             "a ___ girl"],
  ["Indefinite ett-word",  "ett ___ barn",         "glatt",  "glad",   "ett-word: glad → glatt (-d → -tt)",                    "a ___ child"],
  ["Definite / plural",    "___ barn och flickor", "glada",  "glad",   "plural/definite: glad → glada",                        "___ children and girls"],
  // RÖD (red) — -d → -tt
  ["Indefinite en-word",   "en ___ blomma",        "röd",    "röd",    "en-word: base form (röd)",                              "a ___ flower"],
  ["Indefinite ett-word",  "ett ___ hus",          "rött",   "röd",    "ett-word: röd → rött (-d → -tt)",                      "a ___ house"],
  ["Definite / plural",    "___ hus och blommor",  "röda",   "röd",    "plural/definite: röd → röda",                          "___ houses and flowers"],
  // TRÖTT (tired) — ends in -tt already
  ["Indefinite en-word",   "en ___ man",           "trött",  "trött",  "en-word: base form (trött)",                           "a ___ man"],
  ["Indefinite ett-word",  "ett ___ barn",         "trött",  "trött",  "ett-word: already ends in -tt, no change",             "a ___ child"],
  ["Definite / plural",    "___ barn och vuxna",   "trötta", "trött",  "plural/definite: trött → trötta",                     "___ children and adults"],
  // VACKER (beautiful) — -er → drop e before endings
  ["Indefinite en-word",   "en ___ dag",           "vacker", "vacker", "en-word: base form (vacker)",                          "a ___ day"],
  ["Indefinite ett-word",  "ett ___ landskap",     "vackert","vacker", "ett-word: vacker → vackert (drop -e, add -t)",         "a ___ landscape"],
  ["Definite / plural",    "den ___ dagen",        "vackra", "vacker", "definite: vacker → vackra (drop -e, add -a)",          "the ___ day"],
  // BRA (good) — invariable
  ["Indefinite en-word",   "en ___ film",          "bra",    "bra",    "bra is invariable — never changes form",               "a ___ film"],
  ["Indefinite ett-word",  "ett ___ beslut",       "bra",    "bra",    "bra is invariable — same for ett-words",               "a ___ decision"],
  ["Plural",               "___ idéer",            "bra",    "bra",    "bra is invariable — same in plural",                   "___ ideas"],
  // LÅNG (long/tall)
  ["Indefinite en-word",   "en ___ gata",          "lång",   "lång",   "en-word: base form (lång)",                            "a ___ street"],
  ["Indefinite ett-word",  "ett ___ bord",         "långt",  "lång",   "ett-word: lång → långt",                               "a ___ table"],
  ["Definite / plural",    "___ gator",            "långa",  "lång",   "plural: lång → långa",                                 "___ streets"],
];

let queue=[], cur=0, score=0, checked=false;

function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function showCard(){
  const item=queue[cur];
  document.getElementById('ctx').textContent=item[0];
  // Render frame with blank highlighted
  document.getElementById('frame').innerHTML=item[1].replace('___','<span class="blank">___</span>');
  document.getElementById('enGloss').textContent=item[5];
  document.getElementById('baseAdj').textContent='Adjective: '+item[3];
  document.getElementById('counter').textContent=`${cur+1} / ${queue.length}`;
  const inp=document.getElementById('inp');
  inp.value=''; inp.disabled=false; inp.focus();
  document.getElementById('result').style.display='none';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('checkBtn').style.display='';
  checked=false;
}

function doCheck(){
  if(checked)return;
  const item=queue[cur];
  const correct=item[2];
  const inp=document.getElementById('inp');
  // Allow gamla/gamle both for gammal definite
  const alternatives=correct.split('/').map(s=>s.trim().toLowerCase());
  const userVal=inp.value.trim().toLowerCase();
  const ok=alternatives.includes(userVal)||(item[3]==='gammal'&&item[0].includes('Definite')&&(userVal==='gamla'||userVal==='gamle'));
  if(ok)score++;
  checked=true;
  inp.disabled=true;
  document.getElementById('checkBtn').style.display='none';
  const res=document.getElementById('result');
  res.className='result '+(ok?'correct':'wrong');
  res.style.display='block';
  document.getElementById('rlbl').textContent=ok?'✓ Correct':'✗ Incorrect';
  document.getElementById('rans').textContent='Answer: '+correct;
  document.getElementById('rtip').textContent=item[4];
  document.getElementById('nextBtn').style.display='block';
  document.getElementById('scoreBar').textContent=`${score} correct`;
}

function doNext(){
  cur++;
  if(cur>=queue.length){ showEnd(); return; }
  showCard();
}

function showEnd(){
  document.getElementById('game').style.display='none';
  document.getElementById('end').style.display='block';
  document.getElementById('sBig').textContent=score;
  document.getElementById('sSub').textContent=`out of ${queue.length}`;
}

function startRound(){
  queue=shuffle(ITEMS).slice(0,20); cur=0; score=0;
  document.getElementById('end').style.display='none';
  document.getElementById('game').style.display='block';
  document.getElementById('scoreBar').textContent='0 correct';
  showCard();
}

document.getElementById('checkBtn').addEventListener('click',doCheck);
document.getElementById('nextBtn').addEventListener('click',doNext);
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!checked)doCheck();
  else if(e.key==='Enter'&&checked)doNext();
});

startRound();
</script>

<script src="../../domains.js"></script>
<script src="../../sr/engine.js"></script>
<script src="../../sync.js"></script>
<script>
function swSpeak(text) {
  if (!text || !('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text.trim());
  u.lang = 'sv-SE';
  speechSynthesis.speak(u);
}

function swAddXP(amount) {
  if (amount <= 0) return;
  if (typeof engine !== 'undefined') engine.addXP(amount, 'swedish');
  if (typeof sync   !== 'undefined' && sync.isConfigured()) sync.push().catch(function(){});
  // Toast
  var el = document.getElementById('xp-toast-sw');
  if (!el) {
    el = document.createElement('div');
    el.id = 'xp-toast-sw';
    el.style.cssText = 'position:fixed;bottom:1.5rem;right:1rem;background:#b85430;color:#fff;'
      + 'padding:.45rem .9rem;border-radius:8px;font-size:.85rem;font-weight:700;'
      + 'opacity:0;transition:opacity .25s;pointer-events:none;z-index:9999;';
    document.body.appendChild(el);
  }
  el.textContent = '+' + amount + ' XP';
  el.style.opacity = '1';
  setTimeout(function() { el.style.opacity = '0'; }, 2200);
}
</script>
</body>
