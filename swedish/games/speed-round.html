<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Speed Round · Swedish</title>
<script src="../flashcards.js"></script>
<style>
:root { --bg:#faf6f0; --surface:#ffffff; --surface2:#f2ece2; --border:#e8ddd0; --text:#2c1f12; --muted:#8a7a68; --blue:#b85430; --green:#3d6e30; --red:#b03428; --yellow:#a06820; }
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:2.5rem 1rem; }
h1 { font-size:1rem; font-weight:600; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; margin-bottom:2rem; }

/* setup */
.setup { background:var(--surface); border:1px solid var(--border); border-radius:1rem; padding:1.5rem; width:100%; max-width:460px; }
.setup p { color:var(--muted); font-size:.9rem; line-height:1.6; margin-bottom:1.2rem; }
.row { display:flex; gap:1rem; margin-bottom:1.2rem; align-items:flex-end; }
.grp { flex:1; }
.grp label { display:block; font-size:.75rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:.5rem; }
.grp select { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:.4rem; padding:.6rem .8rem; color:var(--text); font-size:.95rem; outline:none; }
.btn { background:var(--blue); color:var(--bg); border:none; border-radius:.5rem; padding:.75rem 1.4rem; font-size:1rem; font-weight:700; cursor:pointer; transition:opacity .15s; white-space:nowrap; }
.btn:hover { opacity:.85; }
.btn-ghost { background:var(--surface2); color:var(--text); }
.btn-full { width:100%; }

/* game */
.game { display:none; width:100%; max-width:460px; }
.hud { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; }
.timer-wrap { text-align:center; }
.timer { font-size:3rem; font-weight:700; color:var(--blue); font-variant-numeric:tabular-nums; line-height:1; }
.timer.urgent { color:var(--red); }
.score-wrap { text-align:right; }
.score-num { font-size:2rem; font-weight:700; color:var(--green); }
.score-lbl { font-size:.7rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
.card { background:var(--surface); border:1px solid var(--border); border-radius:1rem; padding:2.5rem 2rem 2rem; text-align:center; margin-bottom:1rem; min-height:9rem; display:flex; flex-direction:column; justify-content:center; }
.swedish { font-size:2.5rem; font-weight:700; }
.badge { font-size:.7rem; color:var(--muted); opacity:.5; text-transform:uppercase; margin-top:.4rem; }
.flash { font-size:1rem; font-weight:600; min-height:1.5rem; text-align:center; margin-bottom:.5rem; }
.flash.ok { color:var(--green); }
.flash.no { color:var(--red); }
.inp-row { display:flex; gap:.5rem; }
input[type=text] { flex:1; background:var(--surface); border:1.5px solid var(--border); border-radius:.5rem; padding:.75rem 1rem; color:var(--text); font-size:1.1rem; outline:none; transition:border-color .15s; }
input[type=text]:focus { border-color:var(--blue); }
input[type=text]:disabled { opacity:.4; }

/* end */
.end { display:none; text-align:center; max-width:460px; }
.end-score { font-size:5rem; font-weight:700; color:var(--blue); line-height:1; }
.end-sub { color:var(--muted); font-size:1.1rem; margin-bottom:.5rem; }
.end-msg { color:var(--muted); font-size:.9rem; margin-bottom:2rem; }
.nav-home { display:block; width:100%; max-width:600px; font-size:.75rem; color:var(--muted); text-decoration:none; letter-spacing:.06em; margin-bottom:1.25rem; opacity:.7; transition:color .15s, opacity .15s; }
.nav-home:hover { color:var(--blue); opacity:1; }
.setup-err { background:#3f2d2d; border:1px solid var(--red); border-radius:.5rem; padding:.65rem 1rem; font-size:.85rem; color:var(--red); margin-top:.75rem; display:none; }
.btn-hear {
  background:none; border:1px solid var(--border); border-radius:8px;
  color:var(--muted); font-size:.8rem; padding:.3rem .75rem; cursor:pointer;
  display:inline-flex; align-items:center; gap:.3rem;
  transition:border-color .15s, color .15s; margin-top:.5rem;
}
.btn-hear:hover { border-color:var(--blue); color:var(--blue); }
</style>
</head>
<body>
<nav style="background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 1.25rem;height:48px;display:flex;align-items:center;gap:1rem;
  position:sticky;top:0;z-index:100;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <a href="../index.html" style="font-weight:700;font-size:.875rem;color:var(--text);text-decoration:none;">
    🫎 Swedish
  </a>
  <span style="color:var(--border)">›</span>
  <span style="font-size:.875rem;color:var(--muted)">Speed Round</span>
</nav>

<a href="index.html" class="nav-home" id="navHome">← All tools</a>
<h1>Speed Round</h1>

<div class="setup" id="setup">
  <p>60 seconds. Type the English for each Swedish word. A correct answer auto-advances — type fast!</p>
  <div class="row">
    <div class="grp">
      <label>Source</label>
      <select id="srcSel"></select>
    </div>
    <div class="grp">
      <label>Time</label>
      <select id="timeSel">
        <option value="30">30 s</option>
        <option value="60" selected>60 s</option>
        <option value="90">90 s</option>
        <option value="120">2 min</option>
      </select>
    </div>
  </div>
  <button class="btn btn-full" id="startBtn">Start →</button>
  <div class="setup-err" id="setupErr"></div>
</div>

<div class="game" id="game">
  <div class="hud">
    <div class="timer-wrap">
      <div class="timer" id="timer">60</div>
      <div style="font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">seconds</div>
    </div>
    <div class="score-wrap">
      <div class="score-num" id="scoreNum">0</div>
      <div class="score-lbl">correct</div>
    </div>
  </div>
  <div class="card">
    <div class="swedish" id="sw"></div>
<button class="btn-hear" onclick="swSpeak(document.getElementById('sw').textContent)">🔊 Hear it</button>
    <div class="badge" id="badge"></div>
  </div>
  <div class="flash" id="flash"></div>
  <div class="inp-row">
    <input type="text" id="inp" placeholder="English…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="btn btn-ghost" id="skipBtn">Skip</button>
  </div>
</div>

<div class="end" id="end">
  <div class="end-score" id="endScore"></div>
  <div class="end-sub">words correct</div>
  <div class="end-msg" id="endMsg"></div>
  <button class="btn" onclick="startGame()" style="margin-right:.5rem">Play again</button>
  <button class="btn btn-ghost" onclick="showSetup()">Change settings</button>
</div>

<script>
let pool=[], queue=[], cur=0, score=0, totalTime=60, remaining=0, interval=null;

function buildSrcDropdown(){
  const counts={};
  FLASHCARDS.forEach(c=>{counts[c.source]=(counts[c.source]||0)+1;});
  const userSrcs=Object.keys(counts).filter(s=>s!=='anki').sort();
  const urlSrc=new URLSearchParams(location.search).get('source')||'all';
  const sel=document.getElementById('srcSel');
  sel.innerHTML=
    `<option value="all">All sources</option>`+
    `<option value="my-words">My words</option>`+
    userSrcs.map(s=>`<option value="${s}">${s.charAt(0).toUpperCase()+s.slice(1)} (${counts[s]})</option>`).join('')+
    `<option value="anki">Anki deck</option>`;
  sel.value=urlSrc;
  if(!sel.querySelector(`option[value="${urlSrc}"]`)) sel.value='all';
}

function core(s){ return s.replace(/\*[^*]+\*/g,'').split(' — ')[0].split(';')[0].split('(')[0].split('[')[0].replace(/^\d+\.\s*/,'').trim(); }
function norm(s){ return s.toLowerCase().replace(/^(the|a|an)\s+/,'').replace(/[^a-zåäö\s\-]/g,'').replace(/\s+/g,' ').trim(); }
function check(inp,eng){
  const u=norm(inp),c=norm(core(eng));
  if(!u)return false;
  if(u===c)return true;
  for(const p of c.split(/[,\/]/)) if(norm(p.trim())===u) return true;
  if(u.length>=4&&c.includes(u))return true;
  return false;
}
function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function showSetup(){ document.getElementById('setup').style.display=''; document.getElementById('game').style.display='none'; document.getElementById('end').style.display='none'; clearInterval(interval); }

function showErr(msg){const e=document.getElementById('setupErr');e.textContent=msg;e.style.display='block';}

function startGame(){
  const src=document.getElementById('srcSel').value;
  totalTime=parseInt(document.getElementById('timeSel').value);
  pool=FLASHCARDS.filter(c=>{
    if(!c.english.trim()) return false;
    if(src==='all') return true;
    if(src==='my-words') return c.source!=='anki';
    return c.source===src;
  });
  if(!pool.length){showErr('No cards for that source. Try a different one.');return;}
  document.getElementById('setupErr').style.display='none';
  queue=shuffle(pool); cur=0; score=0; remaining=totalTime;
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='block';
  document.getElementById('end').style.display='none';
  document.getElementById('scoreNum').textContent='0';
  document.getElementById('flash').textContent='';
  document.getElementById('flash').className='flash';
  showCard();
  clearInterval(interval);
  interval=setInterval(tick,1000);
  document.getElementById('inp').focus();
}

function tick(){
  remaining--;
  const t=document.getElementById('timer');
  t.textContent=remaining;
  t.className='timer'+(remaining<=10?' urgent':'');
  if(remaining<=0){ clearInterval(interval); endGame(); }
}

function showCard(){
  if(cur>=queue.length){queue=shuffle(pool);cur=0;}
  const c=queue[cur];
  document.getElementById('sw').textContent=c.swedish;
  document.getElementById('badge').textContent=c.source!=='anki'?c.source:'';
  const inp=document.getElementById('inp');
  inp.value=''; inp.disabled=false;
}

function tryAnswer(){
  const inp=document.getElementById('inp');
  const val=inp.value.trim();
  if(!val)return;
  const c=queue[cur];
  const ok=check(val,c.english);
  const flash=document.getElementById('flash');
  if(ok){
    score++;
    document.getElementById('scoreNum').textContent=score;
    flash.textContent='✓ '+core(c.english);
    flash.className='flash ok';
    cur++;
    setTimeout(()=>{flash.textContent='';flash.className='flash';},600);
    showCard();
  } else {
    flash.textContent='✗ try again';
    flash.className='flash no';
    inp.value='';
    setTimeout(()=>{if(flash.classList.contains('no')){flash.textContent='';flash.className='flash';}},800);
  }
}

function skip(){
  const c=queue[cur];
  const flash=document.getElementById('flash');
  flash.textContent='→ '+core(c.english);
  flash.className='flash no';
  cur++;
  setTimeout(()=>{flash.textContent='';flash.className='flash';},800);
  showCard();
}

function endGame(){
  document.getElementById('game').style.display='none';
  document.getElementById('end').style.display='block';
  document.getElementById('endScore').textContent=score;
  const rate=Math.round(score/(totalTime/60));
  document.getElementById('endMsg').textContent=`${rate} correct per minute · ${totalTime}s session`;
}

buildSrcDropdown();
(function(){var s=new URLSearchParams(location.search).get('source');if(s)document.getElementById('navHome').href='index.html?source='+encodeURIComponent(s);})();
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('skipBtn').addEventListener('click',skip);
document.getElementById('inp').addEventListener('keydown',e=>{ if(e.key==='Enter') tryAnswer(); });
</script>

<script src="../../domains.js"></script>
<script src="../../sr/engine.js"></script>
<script src="../../sync.js"></script>
<script>
function swSpeak(text) {
  if (!text || !('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text.trim());
  u.lang = 'sv-SE';
  speechSynthesis.speak(u);
}

function swAddXP(amount) {
  if (amount <= 0) return;
  if (typeof engine !== 'undefined') engine.addXP(amount, 'swedish');
  if (typeof sync   !== 'undefined' && sync.isConfigured()) sync.push().catch(function(){});
  // Toast
  var el = document.getElementById('xp-toast-sw');
  if (!el) {
    el = document.createElement('div');
    el.id = 'xp-toast-sw';
    el.style.cssText = 'position:fixed;bottom:1.5rem;right:1rem;background:#b85430;color:#fff;'
      + 'padding:.45rem .9rem;border-radius:8px;font-size:.85rem;font-weight:700;'
      + 'opacity:0;transition:opacity .25s;pointer-events:none;z-index:9999;';
    document.body.appendChild(el);
  }
  el.textContent = '+' + amount + ' XP';
  el.style.opacity = '1';
  setTimeout(function() { el.style.opacity = '0'; }, 2200);
}
</script>
</body>
</html>
