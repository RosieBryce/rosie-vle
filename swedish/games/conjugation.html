<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Conjugation · Swedish</title>
<style>
:root { --bg:#faf6f0; --surface:#ffffff; --surface2:#f2ece2; --border:#e8ddd0; --text:#2c1f12; --muted:#8a7a68; --blue:#b85430; --green:#3d6e30; --red:#b03428; --yellow:#a06820; }
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:2.5rem 1rem; }
h1 { font-size:1rem; font-weight:600; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; margin-bottom:.5rem; }
.subtitle { font-size:.8rem; color:var(--muted); opacity:.6; margin-bottom:2rem; }

/* setup */
.setup { background:var(--surface); border:1px solid var(--border); border-radius:1rem; padding:1.5rem; width:100%; max-width:460px; }
.setup h2 { font-size:.8rem; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:1rem; }
.filter-grid { display:grid; gap:.5rem; margin-bottom:1.2rem; }
.filter-row { display:flex; align-items:center; gap:.75rem; background:var(--surface2); border-radius:.5rem; padding:.6rem .9rem; cursor:pointer; user-select:none; }
.filter-row input[type=checkbox] { accent-color:var(--blue); width:1rem; height:1rem; }
.tense-grid { display:grid; grid-template-columns:1fr 1fr; gap:.5rem; margin-bottom:1.2rem; }
.btn { background:var(--blue); color:var(--bg); border:none; border-radius:.5rem; padding:.75rem 1.4rem; font-size:1rem; font-weight:700; cursor:pointer; transition:opacity .15s; }
.btn:hover { opacity:.85; }
.btn-ghost { background:var(--surface2); color:var(--text); }
.btn-full { width:100%; }

/* quiz */
.quiz { display:none; width:100%; max-width:460px; }
.topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; font-size:.85rem; color:var(--muted); }
.card { background:var(--surface); border:1px solid var(--border); border-radius:1rem; padding:2.5rem 2rem; text-align:center; margin-bottom:1.2rem; }
.tense-label { font-size:.75rem; text-transform:uppercase; letter-spacing:.1em; color:var(--blue); margin-bottom:.25rem; }
.tense-hint { font-size:.78rem; color:var(--muted); opacity:.7; margin-bottom:.75rem; }
.inf { font-size:2.4rem; font-weight:700; margin-bottom:.3rem; }
.en-gloss { font-size:.9rem; color:var(--muted); margin-bottom:.3rem; }
.group-badge { font-size:.72rem; color:var(--muted); opacity:.5; }
.row { display:flex; gap:.5rem; margin-bottom:.75rem; }
input[type=text] { flex:1; background:var(--surface); border:1.5px solid var(--border); border-radius:.5rem; padding:.75rem 1rem; color:var(--text); font-size:1.1rem; outline:none; transition:border-color .15s; }
input[type=text]:focus { border-color:var(--blue); }
input[type=text]:disabled { opacity:.4; }
.result { padding:.9rem 1.1rem; border-radius:.6rem; margin-bottom:.75rem; display:none; }
.result.correct { background:#2d3f2d; border:1px solid var(--green); }
.result.wrong   { background:#3f2d2d; border:1px solid var(--red); }
.result-lbl { font-weight:700; margin-bottom:.3rem; }
.result.correct .result-lbl { color:var(--green); }
.result.wrong   .result-lbl { color:var(--red); }
.result-ans { color:var(--muted); font-size:.88rem; }
.tip { font-size:.82rem; color:var(--muted); margin-top:.4rem; line-height:1.5; }

/* end */
.end { display:none; text-align:center; max-width:460px; }
.score-big { font-size:5rem; font-weight:700; color:var(--blue); line-height:1; }
.score-sub { color:var(--muted); margin-bottom:2rem; }
.nav-home { display:block; width:100%; max-width:600px; font-size:.75rem; color:var(--muted); text-decoration:none; letter-spacing:.06em; margin-bottom:1.25rem; opacity:.7; transition:color .15s, opacity .15s; }
.nav-home:hover { color:var(--blue); opacity:1; }
.btn-hear {
  background:none; border:1px solid var(--border); border-radius:8px;
  color:var(--muted); font-size:.8rem; padding:.3rem .75rem; cursor:pointer;
  display:inline-flex; align-items:center; gap:.3rem;
  transition:border-color .15s, color .15s; margin-top:.5rem;
}
.btn-hear:hover { border-color:var(--blue); color:var(--blue); }
</style>
</head>
<body>
<nav style="background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 1.25rem;height:48px;display:flex;align-items:center;gap:1rem;
  position:sticky;top:0;z-index:100;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <a href="../index.html" style="font-weight:700;font-size:.875rem;color:var(--text);text-decoration:none;">
    🫎 Swedish
  </a>
  <span style="color:var(--border)">›</span>
  <span style="font-size:.875rem;color:var(--muted)">Conjugation</span>
</nav>

<a href="index.html" class="nav-home">← All tools</a>
<h1>Conjugation</h1>
<div class="subtitle">Type the correct verb form</div>

<div class="setup" id="setup">
  <h2>Verb groups</h2>
  <div class="filter-grid" id="groupGrid"></div>
  <h2 style="margin-top:.5rem">Tenses</h2>
  <div class="tense-grid" id="tenseGrid"></div>
  <button class="btn btn-full" id="startBtn">Start →</button>
</div>

<div class="quiz" id="quiz">
  <div class="topbar">
    <span id="counter">1 / 20</span>
    <span id="scoreBar">0 correct</span>
    <button class="btn btn-ghost" style="padding:.3rem .8rem;font-size:.8rem" onclick="showSetup()">End</button>
  </div>
  <div class="card">
    <div class="tense-label" id="tenseLabel"></div>
    <div class="tense-hint" id="tenseHint"></div>
    <div class="inf" id="inf"></div>
    <button class="btn-hear" onclick="swSpeak(document.getElementById('inf').textContent)">🔊 Hear again</button>
    <div class="en-gloss" id="enGloss"></div>
    <div class="group-badge" id="groupBadge"></div>
  </div>
  <div class="row">
    <input type="text" id="inp" placeholder="Type the form…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="btn" id="checkBtn">Check</button>
  </div>
  <div class="result" id="result">
    <div class="result-lbl" id="rlbl"></div>
    <div class="result-ans" id="rans"></div>
    <div class="tip" id="rtip"></div>
  </div>
  <button class="btn btn-ghost" id="nextBtn" style="display:none;width:100%">Next →</button>
</div>

<div class="end" id="end">
  <div class="score-big" id="sBig"></div>
  <div class="score-sub" id="sSub"></div>
  <button class="btn" onclick="startQuiz()" style="margin-right:.5rem">Again</button>
  <button class="btn btn-ghost" onclick="showSetup()">Settings</button>
</div>

<script>
const VERBS = [
  // Group 1 (ar-verbs): -a / -ar / -ade / -at
  {inf:"tala",  en:"speak",   pres:"talar",   pret:"talade",  sup:"talat",  g:"1"},
  {inf:"jobba", en:"work",    pres:"jobbar",  pret:"jobbade", sup:"jobbat", g:"1"},
  {inf:"lyssna",en:"listen",  pres:"lyssnar", pret:"lyssnade",sup:"lyssnat",g:"1"},
  {inf:"stänga",en:"close",   pres:"stänger", pret:"stängde", sup:"stängt", g:"2a"},
  {inf:"titta", en:"look/watch",pres:"tittar",pret:"tittade", sup:"tittat", g:"1"},
  {inf:"hoppas",en:"hope",    pres:"hoppas",  pret:"hoppades",sup:"hoppats",g:"1"},
  // Group 2a: -er / -de / -t
  {inf:"ringa", en:"call/ring",pres:"ringer", pret:"ringde",  sup:"ringt",  g:"2a"},
  {inf:"läsa",  en:"read",    pres:"läser",   pret:"läste",   sup:"läst",   g:"2b"},
  {inf:"möta",  en:"meet",    pres:"möter",   pret:"mötte",   sup:"mött",   g:"2b"},
  // Group 2b: -er / -te / -t (voiceless stem)
  {inf:"köpa",  en:"buy",     pres:"köper",   pret:"köpte",   sup:"köpt",   g:"2b"},
  {inf:"hjälpa",en:"help",    pres:"hjälper", pret:"hjälpte", sup:"hjälpt", g:"2b"},
  {inf:"lyfta", en:"lift",    pres:"lyfter",  pret:"lyfte",   sup:"lyft",   g:"2b"},
  // Group 3 (short verbs)
  {inf:"bo",    en:"live/reside",pres:"bor",  pret:"bodde",   sup:"bott",   g:"3"},
  {inf:"tro",   en:"believe", pres:"tror",    pret:"trodde",  sup:"trott",  g:"3"},
  {inf:"sy",    en:"sew",     pres:"syr",     pret:"sydde",   sup:"sytt",   g:"3"},
  // Group 4 (strong verbs)
  {inf:"skriva",en:"write",   pres:"skriver", pret:"skrev",   sup:"skrivit",g:"4"},
  {inf:"sjunga",en:"sing",    pres:"sjunger", pret:"sjöng",   sup:"sjungit",g:"4"},
  {inf:"bita",  en:"bite",    pres:"biter",   pret:"bet",     sup:"bitit",  g:"4"},
  {inf:"frysa", en:"freeze",  pres:"fryser",  pret:"frös",    sup:"frusit", g:"4"},
  // Irregular
  {inf:"vara",  en:"be",      pres:"är",      pret:"var",     sup:"varit",  g:"irr"},
  {inf:"ha",    en:"have",    pres:"har",     pret:"hade",    sup:"haft",   g:"irr"},
  {inf:"gå",    en:"go/walk", pres:"går",     pret:"gick",    sup:"gått",   g:"irr"},
  {inf:"komma", en:"come",    pres:"kommer",  pret:"kom",     sup:"kommit", g:"irr"},
  {inf:"se",    en:"see",     pres:"ser",     pret:"såg",     sup:"sett",   g:"irr"},
  {inf:"ta",    en:"take",    pres:"tar",     pret:"tog",     sup:"tagit",  g:"irr"},
  {inf:"ge",    en:"give",    pres:"ger",     pret:"gav",     sup:"gett",   g:"irr"},
  {inf:"säga",  en:"say",     pres:"säger",   pret:"sade",    sup:"sagt",   g:"irr"},
  {inf:"bli",   en:"become",  pres:"blir",    pret:"blev",    sup:"blivit", g:"irr"},
  {inf:"veta",  en:"know",    pres:"vet",     pret:"visste",  sup:"vetat",  g:"irr"},
  {inf:"stå",   en:"stand",   pres:"står",    pret:"stod",    sup:"stått",  g:"irr"},
  {inf:"heta",  en:"be called",pres:"heter",  pret:"hette",   sup:"hetat",  g:"irr"},
  {inf:"ligga", en:"lie/be located",pres:"ligger",pret:"låg", sup:"legat",  g:"irr"},
  {inf:"sitta", en:"sit",     pres:"sitter",  pret:"satt",    sup:"suttit", g:"irr"},
  {inf:"hitta", en:"find",    pres:"hittar",  pret:"hittade", sup:"hittat", g:"1"},
];

const GROUPS = {
  "1":  "Group 1 — ar-verbs (tala/talar/talade/talat)",
  "2a": "Group 2a — er-verbs /de (ringa/ringer/ringde/ringt)",
  "2b": "Group 2b — er-verbs /te (köpa/köper/köpte/köpt)",
  "3":  "Group 3 — short verbs (bo/bor/bodde/bott)",
  "4":  "Group 4 — strong verbs (skriva/skriver/skrev/skrivit)",
  "irr":"Irregular verbs",
};
const TENSES = {pres:"present",pret:"preterite",sup:"supine"};
const TENSE_HINTS = {
  pres: "what happens now or regularly — \"I speak\", \"she speaks\"",
  pret: "simple past — \"I spoke\", \"she spoke\" (yesterday / last week)",
  sup:  "used with har / hade — \"I have spoken\", \"she had spoken\"",
};

let queue=[], cur=0, score=0, checked=false;

function buildSetup(){
  // Groups
  document.getElementById('groupGrid').innerHTML = Object.entries(GROUPS).map(([k,v])=>`
    <label class="filter-row">
      <input type="checkbox" value="${k}" checked>
      <span>${v}</span>
    </label>`).join('');
  // Tenses
  document.getElementById('tenseGrid').innerHTML = Object.entries(TENSES).map(([k,v])=>`
    <label class="filter-row">
      <input type="checkbox" name="tense" value="${k}" checked>
      <span style="text-transform:capitalize">${v}</span>
    </label>`).join('');
  document.getElementById('startBtn').onclick=startQuiz;
}

function showSetup(){ document.getElementById('setup').style.display=''; document.getElementById('quiz').style.display='none'; document.getElementById('end').style.display='none'; }

function startQuiz(){
  const gs=[...document.querySelectorAll('#groupGrid input:checked')].map(e=>e.value);
  const ts=[...document.querySelectorAll('#tenseGrid input:checked')].map(e=>e.value);
  if(!gs.length||!ts.length){alert('Select at least one group and one tense.');return;}
  // Build queue: each verb × each tense
  const items=[];
  VERBS.filter(v=>gs.includes(v.g)).forEach(v=>{
    ts.forEach(t=>items.push({verb:v, tense:t}));
  });
  if(!items.length){alert('No verbs match those filters.');return;}
  queue=shuffle(items).slice(0,20); cur=0; score=0; checked=false;
  document.getElementById('setup').style.display='none';
  document.getElementById('quiz').style.display='block';
  document.getElementById('end').style.display='none';
  showCard();
}

function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function showCard(){
  const {verb,tense}=queue[cur];
  document.getElementById('tenseLabel').textContent=TENSES[tense].toUpperCase();
  document.getElementById('tenseHint').textContent=TENSE_HINTS[tense];
  document.getElementById('inf').textContent=verb.inf;
  swSpeak(verb.inf);
  document.getElementById('enGloss').textContent='to '+verb.en;
  document.getElementById('groupBadge').textContent='Group '+verb.g;
  document.getElementById('counter').textContent=`${cur+1} / ${queue.length}`;
  document.getElementById('scoreBar').textContent=`${score} correct`;
  const inp=document.getElementById('inp');
  inp.value=''; inp.disabled=false; inp.focus();
  document.getElementById('result').style.display='none';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('checkBtn').style.display='';
  checked=false;
}

function doCheck(){
  if(checked)return;
  const {verb,tense}=queue[cur];
  const correct=verb[tense];
  const inp=document.getElementById('inp');
  const userVal=inp.value.trim().toLowerCase();
  // Allow alternative forms (e.g. sade/sa for säga)
  const alternatives=correct.split('/').map(s=>s.trim().toLowerCase());
  const ok=alternatives.includes(userVal);
  if(ok)score++;
  checked=true;
  inp.disabled=true;
  document.getElementById('checkBtn').style.display='none';
  const res=document.getElementById('result');
  res.className='result '+(ok?'correct':'wrong');
  res.style.display='block';
  document.getElementById('rlbl').textContent=ok?'✓ Correct':'✗ Incorrect';
  document.getElementById('rans').textContent=`${verb.inf} — ${TENSES[tense]}: ${correct}`;
  // Tip: show all forms
  document.getElementById('rtip').textContent=`${verb.inf} / ${verb.pres} / ${verb.pret} / ${verb.sup}`;
  document.getElementById('nextBtn').style.display='block';
  document.getElementById('scoreBar').textContent=`${score} correct`;
}

function doNext(){
  cur++;
  if(cur>=queue.length){
    document.getElementById('quiz').style.display='none';
    document.getElementById('end').style.display='block';
    document.getElementById('sBig').textContent=score;
    document.getElementById('sSub').textContent=`out of ${queue.length}`;
  } else showCard();
}

document.getElementById('checkBtn').addEventListener('click',doCheck);
document.getElementById('nextBtn').addEventListener('click',doNext);
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!checked) doCheck();
  else if(e.key==='Enter'&&checked) doNext();
});

buildSetup();
</script>

<script src="../../domains.js"></script>
<script src="../../sr/engine.js"></script>
<script src="../../sync.js"></script>
<script>
function swSpeak(text) {
  if (!text || !('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text.trim());
  u.lang = 'sv-SE';
  speechSynthesis.speak(u);
}

function swAddXP(amount) {
  if (amount <= 0) return;
  if (typeof engine !== 'undefined') engine.addXP(amount, 'swedish');
  if (typeof sync   !== 'undefined' && sync.isConfigured()) sync.push().catch(function(){});
  // Toast
  var el = document.getElementById('xp-toast-sw');
  if (!el) {
    el = document.createElement('div');
    el.id = 'xp-toast-sw';
    el.style.cssText = 'position:fixed;bottom:1.5rem;right:1rem;background:#b85430;color:#fff;'
      + 'padding:.45rem .9rem;border-radius:8px;font-size:.85rem;font-weight:700;'
      + 'opacity:0;transition:opacity .25s;pointer-events:none;z-index:9999;';
    document.body.appendChild(el);
  }
  el.textContent = '+' + amount + ' XP';
  el.style.opacity = '1';
  setTimeout(function() { el.style.opacity = '0'; }, 2200);
}
</script>
</body>
</html>
