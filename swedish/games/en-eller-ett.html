<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>En eller ett? · Swedish</title>
<style>
:root { --bg:#faf6f0; --surface:#ffffff; --surface2:#f2ece2; --border:#e8ddd0; --text:#2c1f12; --muted:#8a7a68; --blue:#b85430; --green:#3d6e30; --red:#b03428; --yellow:#a06820; }
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:2.5rem 1rem; }
h1 { font-size:1rem; font-weight:600; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; margin-bottom:2rem; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:1rem; padding:3rem 2rem; width:100%; max-width:420px; text-align:center; margin-bottom:1.5rem; min-height:12rem; display:flex; flex-direction:column; justify-content:center; }
.word { font-size:3rem; font-weight:700; letter-spacing:-.01em; margin-bottom:.4rem; }
.translation { font-size:.9rem; color:var(--muted); min-height:1.4rem; }
.btn-row { display:flex; gap:1rem; width:100%; max-width:420px; margin-bottom:1rem; }
.btn-gender { flex:1; padding:1.1rem; font-size:1.4rem; font-weight:700; border:2px solid var(--border); border-radius:.75rem; background:var(--surface); color:var(--text); cursor:pointer; transition:all .12s; }
.btn-gender:hover { border-color:var(--blue); background:var(--surface2); }
.btn-gender.correct { border-color:var(--green); background:#2d3f2d; color:var(--green); }
.btn-gender.wrong   { border-color:var(--red);   background:#3f2d2d; color:var(--red); }
.btn-gender.reveal  { border-color:var(--green); background:#2d3f2d; color:var(--green); }
.btn-gender:disabled { cursor:default; }
.feedback { font-size:.9rem; color:var(--muted); min-height:1.4rem; text-align:center; margin-bottom:1rem; max-width:420px; }
.stats { display:flex; gap:2rem; margin-bottom:2rem; }
.stat { text-align:center; }
.stat-n { font-size:1.8rem; font-weight:700; color:var(--blue); }
.stat-l { font-size:.7rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
.streak { font-size:.85rem; color:var(--yellow); min-height:1.2rem; text-align:center; margin-bottom:1rem; }
.btn { background:var(--blue); color:var(--bg); border:none; border-radius:.5rem; padding:.65rem 1.3rem; font-size:.95rem; font-weight:700; cursor:pointer; }
.btn:hover { opacity:.85; }
.btn-ghost { background:var(--surface2); color:var(--text); }
.nav-home { display:block; width:100%; max-width:600px; font-size:.75rem; color:var(--muted); text-decoration:none; letter-spacing:.06em; margin-bottom:1.25rem; opacity:.7; transition:color .15s, opacity .15s; }
.nav-home:hover { color:var(--blue); opacity:1; }
.end { display:none; text-align:center; max-width:420px; margin-top:1rem; }
.end-score { font-size:5rem; font-weight:700; color:var(--blue); line-height:1; margin-bottom:.5rem; }
.end-sub { color:var(--muted); font-size:1.1rem; margin-bottom:.5rem; }
.end-msg { color:var(--muted); font-size:.9rem; margin-bottom:2rem; }
.btn-hear {
  background:none; border:1px solid var(--border); border-radius:8px;
  color:var(--muted); font-size:.8rem; padding:.3rem .75rem; cursor:pointer;
  display:inline-flex; align-items:center; gap:.3rem;
  transition:border-color .15s, color .15s; margin-top:.5rem;
}
.btn-hear:hover { border-color:var(--blue); color:var(--blue); }
</style>
</head>
<body>
<nav style="background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 1.25rem;height:48px;display:flex;align-items:center;gap:1rem;
  position:sticky;top:0;z-index:100;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <a href="../index.html" style="font-weight:700;font-size:.875rem;color:var(--text);text-decoration:none;">
    🫎 Swedish
  </a>
  <span style="color:var(--border)">›</span>
  <span style="font-size:.875rem;color:var(--muted)">En eller ett?</span>
</nav>

<a href="index.html" class="nav-home">← All tools</a>
<h1>En eller ett?</h1>

<div id="game">
<div class="stats">
  <div class="stat"><div class="stat-n" id="correct">0</div><div class="stat-l">Correct</div></div>
  <div class="stat"><div class="stat-n" id="seen">0</div><div class="stat-l">/ 20</div></div>
  <div class="stat"><div class="stat-n" id="pct">—</div><div class="stat-l">Score</div></div>
</div>
<div class="streak" id="streak"></div>

<div class="card">
  <div class="word" id="word"></div>
<button class="btn-hear" onclick="swSpeak(document.getElementById('word').textContent)">🔊 Hear it</button>
  <div class="translation" id="trans"></div>
</div>

<div class="btn-row">
  <button class="btn-gender" id="btnEn" onclick="guess('en')">en</button>
  <button class="btn-gender" id="btnEtt" onclick="guess('ett')">ett</button>
</div>
<div class="feedback" id="feedback"></div>
<button class="btn btn-ghost" id="nextBtn" style="display:none" onclick="seen>=ROUND_SIZE?endRound():nextWord()">Next →</button>
<button class="btn btn-ghost" style="margin-top:1.5rem;font-size:.8rem" onclick="reset()">Restart</button>
</div>

<div class="end" id="end">
  <div class="end-score" id="endScore"></div>
  <div class="end-sub">out of 20</div>
  <div class="end-msg" id="endMsg"></div>
  <button class="btn" onclick="reset()">Play again</button>
</div>

<script>
const NOUNS = [
  // EN words
  {sv:"arm",en:"arm",g:"en"},{sv:"bil",en:"car",g:"en"},{sv:"bok",en:"book",g:"en"},
  {sv:"buss",en:"bus",g:"en"},{sv:"dag",en:"day",g:"en"},{sv:"flicka",en:"girl",g:"en"},
  {sv:"gata",en:"street",g:"en"},{sv:"hand",en:"hand",g:"en"},{sv:"hund",en:"dog",g:"en"},
  {sv:"katt",en:"cat",g:"en"},{sv:"kvinna",en:"woman",g:"en"},{sv:"kväll",en:"evening",g:"en"},
  {sv:"lärare",en:"teacher",g:"en"},{sv:"middag",en:"dinner",g:"en"},{sv:"natt",en:"night",g:"en"},
  {sv:"pojke",en:"boy",g:"en"},{sv:"röst",en:"voice",g:"en"},{sv:"sjö",en:"lake",g:"en"},
  {sv:"skola",en:"school",g:"en"},{sv:"skog",en:"forest",g:"en"},{sv:"sol",en:"sun",g:"en"},
  {sv:"stad",en:"city",g:"en"},{sv:"stol",en:"chair",g:"en"},{sv:"tid",en:"time",g:"en"},
  {sv:"tidning",en:"newspaper",g:"en"},{sv:"tåg",en:"train",g:"en"},{sv:"väska",en:"bag",g:"en"},
  {sv:"vän",en:"friend",g:"en"},{sv:"dörr",en:"door",g:"en"},{sv:"fågel",en:"bird",g:"en"},
  {sv:"häst",en:"horse",g:"en"},{sv:"lampa",en:"lamp",g:"en"},{sv:"säng",en:"bed",g:"en"},
  {sv:"resa",en:"journey/trip",g:"en"},{sv:"tanke",en:"thought",g:"en"},{sv:"vecka",en:"week",g:"en"},
  {sv:"mamma",en:"mum",g:"en"},{sv:"pappa",en:"dad",g:"en"},{sv:"fråga",en:"question",g:"en"},
  {sv:"känsla",en:"feeling",g:"en"},{sv:"människa",en:"person",g:"en"},{sv:"mening",en:"sentence/meaning",g:"en"},
  {sv:"möjlighet",en:"possibility",g:"en"},{sv:"plats",en:"place",g:"en"},{sv:"rörelse",en:"movement",g:"en"},
  {sv:"sommar",en:"summer",g:"en"},{sv:"vinter",en:"winter",g:"en"},{sv:"höst",en:"autumn",g:"en"},
  {sv:"värld",en:"world",g:"en"},{sv:"film",en:"film",g:"en"},{sv:"musik",en:"music",g:"en"},
  // ETT words
  {sv:"arbete",en:"work",g:"ett"},{sv:"barn",en:"child",g:"ett"},{sv:"berg",en:"mountain",g:"ett"},
  {sv:"bord",en:"table",g:"ett"},{sv:"brev",en:"letter",g:"ett"},{sv:"djur",en:"animal",g:"ett"},
  {sv:"fönster",en:"window",g:"ett"},{sv:"hav",en:"sea",g:"ett"},{sv:"hjärta",en:"heart",g:"ett"},
  {sv:"hus",en:"house",g:"ett"},{sv:"huvud",en:"head",g:"ett"},{sv:"land",en:"country",g:"ett"},
  {sv:"möte",en:"meeting",g:"ett"},{sv:"ord",en:"word",g:"ett"},{sv:"problem",en:"problem",g:"ett"},
  {sv:"rum",en:"room",g:"ett"},{sv:"språk",en:"language",g:"ett"},{sv:"tak",en:"roof",g:"ett"},
  {sv:"träd",en:"tree",g:"ett"},{sv:"år",en:"year",g:"ett"},{sv:"ansikte",en:"face",g:"ett"},
  {sv:"beslut",en:"decision",g:"ett"},{sv:"fel",en:"mistake",g:"ett"},{sv:"golv",en:"floor",g:"ett"},
  {sv:"jobb",en:"job",g:"ett"},{sv:"kontor",en:"office",g:"ett"},{sv:"liv",en:"life",g:"ett"},
  {sv:"mål",en:"goal",g:"ett"},{sv:"svar",en:"answer",g:"ett"},{sv:"vatten",en:"water",g:"ett"},
  {sv:"ögonblick",en:"moment",g:"ett"},{sv:"system",en:"system",g:"ett"},{sv:"program",en:"programme",g:"ett"},
  {sv:"museum",en:"museum",g:"ett"},{sv:"bibliotek",en:"library",g:"ett"},{sv:"minne",en:"memory",g:"ett"},
  {sv:"företag",en:"company",g:"ett"},{sv:"samtal",en:"conversation",g:"ett"},{sv:"öga",en:"eye",g:"ett"},
  {sv:"öra",en:"ear",g:"ett"},{sv:"hjärna",en:"brain",g:"ett"},{sv:"knä",en:"knee",g:"ett"},
];

const ROUND_SIZE = 20;
let deck=[], cur=0, correct=0, seen=0, streak=0, answered=false;

function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function showWord(){
  if(cur>=deck.length){deck=shuffle(NOUNS);cur=0;}
  const n=deck[cur];
  document.getElementById('word').textContent=n.sv;
  swSpeak(n.sv);
  document.getElementById('trans').textContent='';
  document.getElementById('feedback').textContent='';
  document.getElementById('nextBtn').style.display='none';
  const be=document.getElementById('btnEn'), bett=document.getElementById('btnEtt');
  be.className='btn-gender'; bett.className='btn-gender';
  be.disabled=false; bett.disabled=false;
  answered=false;
}

function guess(g){
  if(answered)return;
  answered=true;
  const n=deck[cur];
  const ok=(g===n.g);
  seen++;
  if(ok){ correct++; streak++; } else { streak=0; }
  // Update buttons
  const be=document.getElementById('btnEn'), bett=document.getElementById('btnEtt');
  be.disabled=true; bett.disabled=true;
  if(g==='en') be.className='btn-gender '+(ok?'correct':'wrong');
  else bett.className='btn-gender '+(ok?'correct':'wrong');
  // Reveal correct if wrong
  if(!ok){
    if(n.g==='en') be.className='btn-gender reveal';
    else bett.className='btn-gender reveal';
  }
  // Show translation
  document.getElementById('trans').textContent=n.en;
  document.getElementById('feedback').textContent=ok
    ? `✓ ${n.g} ${n.sv} — ${n.en}`
    : `✗ It's ${n.g} ${n.sv} — ${n.en}`;
  // Streak
  document.getElementById('streak').textContent=streak>=3?`🔥 ${streak} in a row`:'';
  // Stats
  document.getElementById('correct').textContent=correct;
  document.getElementById('seen').textContent=seen;
  document.getElementById('pct').textContent=seen?Math.round(correct/seen*100)+'%':'—';
  // Auto-advance after short delay
  setTimeout(()=>{ if(answered){ if(seen>=ROUND_SIZE) endRound(); else nextWord(); } },1200);
  document.getElementById('nextBtn').style.display='block';
}

function nextWord(){ cur++; showWord(); }

function endRound(){
  document.getElementById('game').style.display='none';
  document.getElementById('end').style.display='block';
  document.getElementById('endScore').textContent=correct;
  const pct=Math.round(correct/ROUND_SIZE*100);
  const msg=pct===100?'Perfect round!':pct>=90?'Excellent!':pct>=75?'Good work.':pct>=50?'Getting there.':'Keep practising.';
  document.getElementById('endMsg').textContent=msg;
}

function reset(){
  correct=0; seen=0; streak=0;
  document.getElementById('correct').textContent='0';
  document.getElementById('seen').textContent='0';
  document.getElementById('pct').textContent='—';
  document.getElementById('streak').textContent='';
  document.getElementById('game').style.display='block';
  document.getElementById('end').style.display='none';
  deck=shuffle(NOUNS); cur=0; showWord();
}

deck=shuffle(NOUNS);
showWord();
</script>

<script src="../../domains.js"></script>
<script src="../../sr/engine.js"></script>
<script src="../../sync.js"></script>
<script>
function swSpeak(text) {
  if (!text || !('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text.trim());
  u.lang = 'sv-SE';
  speechSynthesis.speak(u);
}

function swAddXP(amount) {
  if (amount <= 0) return;
  if (typeof engine !== 'undefined') engine.addXP(amount, 'swedish');
  if (typeof sync   !== 'undefined' && sync.isConfigured()) sync.push().catch(function(){});
  // Toast
  var el = document.getElementById('xp-toast-sw');
  if (!el) {
    el = document.createElement('div');
    el.id = 'xp-toast-sw';
    el.style.cssText = 'position:fixed;bottom:1.5rem;right:1rem;background:#b85430;color:#fff;'
      + 'padding:.45rem .9rem;border-radius:8px;font-size:.85rem;font-weight:700;'
      + 'opacity:0;transition:opacity .25s;pointer-events:none;z-index:9999;';
    document.body.appendChild(el);
  }
  el.textContent = '+' + amount + ' XP';
  el.style.opacity = '1';
  setTimeout(function() { el.style.opacity = '0'; }, 2200);
}
</script>
</body>
</html>
