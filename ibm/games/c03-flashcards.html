<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../shared.css">
  <script src="../shared.js"></script>
  <script src="../../domains.js"></script>

  <script src="../../sync.js"></script>
  <style>
    #xp-toast { position:fixed; bottom:1.5rem; right:1.5rem; z-index:999;
      background:#d29922; color:#0d1117; font-size:.85rem; font-weight:700;
      padding:.5rem 1rem; border-radius:99px; opacity:0; pointer-events:none;
      transition:opacity .3s ease; }
    #xp-toast.show { opacity:1; }
  </style>
  <style>
    .game-shell { max-width: 680px; margin: 0 auto; }

    /* ── Intro ── */
    .intro-card { text-align:center; padding:2.5rem 2rem; }
    .intro-badge { display:inline-block; font-size:.75rem; font-weight:700; text-transform:uppercase;
      letter-spacing:.08em; padding:.3rem .75rem; border-radius:99px;
      background:var(--green-bg); color:var(--green); border:1px solid rgba(63,185,80,.3); margin-bottom:1.25rem; }
    .intro-title { font-size:1.3rem; font-weight:700; letter-spacing:-.02em; margin-bottom:.5rem; }
    .intro-meta { color:var(--muted); font-size:.875rem; margin-bottom:1.75rem; line-height:1.6; }
    .btn-start { padding:.65rem 2rem; border-radius:8px; background:var(--green);
      color:#fff; font-weight:600; font-size:.9rem; border:none; cursor:pointer; transition:opacity .15s; }
    .btn-start:hover { opacity:.85; }

    /* ── Progress ── */
    .q-progress { margin-bottom:1.25rem; }
    .q-progress-label { display:flex; justify-content:space-between; font-size:.78rem;
      color:var(--muted); margin-bottom:.35rem; }
    .q-bar { height:4px; background:var(--surface2); border-radius:99px; overflow:hidden; }
    .q-bar-fill { height:100%; background:var(--green); border-radius:99px; transition:width .3s ease; }
    .score-chips { display:flex; gap:.5rem; }
    .chip { font-size:.75rem; font-weight:700; padding:.15rem .55rem;
      border-radius:99px; }
    .chip-g { background:var(--green-bg); color:var(--green); }
    .chip-y { background:var(--yellow-bg); color:var(--yellow); }
    .chip-r { background:rgba(248,81,73,.1); color:var(--red); }

    /* ── Flash card ── */
    .flash-card { cursor:pointer; min-height:220px; position:relative;
      border:1px solid var(--border); border-radius:12px; overflow:hidden;
      background:var(--surface); transition:border-color .2s; }
    .flash-card:hover { border-color:var(--blue); }
    .flash-face { padding:2rem 1.75rem; }
    .flash-face.front .face-label { color:var(--blue); }
    .flash-face.back { border-top:1px solid var(--border); background:var(--surface2); display:none; }
    .flash-face.back .face-label { color:var(--green); }
    .face-label { font-size:.72rem; font-weight:700; text-transform:uppercase;
      letter-spacing:.08em; margin-bottom:.75rem; }
    .face-text { font-size:.925rem; line-height:1.65; }
    .face-text code { background:var(--surface2); padding:.1em .35em; border-radius:4px;
      font-size:.85em; color:var(--blue); font-family:"SFMono-Regular",Consolas,monospace; }
    .flash-hint { font-size:.75rem; color:var(--muted); text-align:center;
      padding:.5rem; border-top:1px solid var(--border); }

    /* ── Self-assess ── */
    .assess-bar { display:flex; gap:.625rem; margin-top:1rem; }
    .assess-btn { flex:1; padding:.6rem .5rem; border-radius:8px; font-size:.83rem; font-weight:600;
      border:1px solid; cursor:pointer; transition:opacity .15s; }
    .assess-btn:hover { opacity:.8; }
    .assess-btn.got-it { background:var(--green-bg); border-color:rgba(63,185,80,.4); color:var(--green); }
    .assess-btn.nearly { background:var(--yellow-bg); border-color:rgba(210,153,34,.4); color:var(--yellow); }
    .assess-btn.missed { background:rgba(248,81,73,.08); border-color:rgba(248,81,73,.35); color:var(--red); }

    /* ── Results ── */
    .result-row { display:flex; gap:.75rem; justify-content:center; flex-wrap:wrap; margin-bottom:1.5rem; }
    .result-badge { text-align:center; padding:1rem 1.5rem; border-radius:10px; min-width:90px; }
    .result-badge .rnum { font-size:2rem; font-weight:700; }
    .result-badge .rlbl { font-size:.75rem; font-weight:600; text-transform:uppercase;
      letter-spacing:.06em; margin-top:.2rem; }
    .result-badge.g { background:var(--green-bg); color:var(--green); }
    .result-badge.y { background:var(--yellow-bg); color:var(--yellow); }
    .result-badge.r { background:rgba(248,81,73,.08); color:var(--red); }
    .results-actions { display:flex; gap:.75rem; justify-content:center; flex-wrap:wrap; margin-top:1.25rem; }
    .btn-action { padding:.55rem 1.25rem; border-radius:8px; font-size:.875rem; font-weight:600;
      cursor:pointer; border:1px solid var(--border); background:var(--surface2);
      color:var(--text); text-decoration:none; transition:border-color .12s; }
    .btn-action:hover { border-color:var(--green); color:var(--green); }
    .btn-action.primary { background:var(--green); border-color:var(--green); color:#fff; }
    .btn-action.primary:hover { opacity:.85; }
  </style>
</head>
<body>
<script>initNav('../'); localStorage.setItem('VLE_lastGame', 'C3 Flashcards — Keras & TF');</script>

<div class="container">
  <div class="game-shell">

    <div style="margin-bottom:1.25rem">
      <div class="tag" style="background:var(--green-bg);color:var(--green);border:1px solid rgba(63,185,80,.3);margin-bottom:.4rem">
        Study Game · Flashcards
      </div>
      <h1 style="font-size:1.3rem;font-weight:700;letter-spacing:-.02em">C3 Flashcards — Keras &amp; TensorFlow</h1>
    </div>

    <div id="game-root"></div>

  </div>
</div>

<script>
// ── Card bank ─────────────────────────────────────────────────────────────────
const CARDS = [
  {
    q: "What conceptual limitation does the Sequential API have, and what category of architectures requires the Functional API?",
    a: "Sequential assumes a single linear chain: one input → one output, each layer feeding the next. It cannot express branching, merging, or shared layers. The Functional API is required for: multi-input models, multi-output models, models with skip connections (ResNet), and any architecture where the graph is not strictly linear."
  },
  {
    q: "Why does transfer learning work? What assumption must hold for it to be valid?",
    a: "Transfer learning works because early layers in deep networks learn general low-level features (edges, textures, shapes) that are useful across many tasks. The assumption is that the source domain (e.g. ImageNet) and target domain share some underlying structure. If the domains are too dissimilar, transferred features may not help — or may actively hurt."
  },
  {
    q: "What is the rationale for freezing the base model first, then unfreezing for fine-tuning? Why not train everything from the start?",
    a: "Freezing first lets the randomly-initialised head layers converge without large gradients cascading back through the pretrained base and destroying its weights. Once the head is stable, fine-tuning with a small learning rate makes targeted adjustments to the base. Starting with full training risks 'catastrophic forgetting' of the pretrained features."
  },
  {
    q: "What are the two terms in the VAE loss function, and what does each one enforce?",
    a: "1. Reconstruction loss (e.g. binary cross-entropy or MSE): penalises the decoder for producing outputs that differ from the original input. Enforces that the model learns to faithfully reconstruct. 2. KL divergence term: penalises the encoder for producing a latent distribution that differs from N(0,1). Enforces a structured, continuous latent space that supports sampling and generation."
  },
  {
    q: "Why can a VAE generate new data, but a plain autoencoder cannot?",
    a: "A plain autoencoder's latent space is unstructured — points that weren't produced by encoding real inputs decode to noise. The VAE's KL divergence loss regularises the latent space to approximate N(0,1): it is smooth, continuous, and fully covered. This means you can sample any point z ~ N(0,1) and decode it to get a plausible output."
  },
  {
    q: "What are the generator's and discriminator's objectives in GAN training? Why is it called adversarial?",
    a: "Discriminator: maximise its ability to distinguish real samples from generated fakes. Generator: maximise the discriminator's error rate — produce outputs the discriminator labels as real. They have opposing objectives (adversarial). Training is a minimax game: D gets better at detecting fakes, G gets better at producing convincing ones. Neither can simply optimise independently."
  },
  {
    q: "What is mode collapse in GAN training, what causes it, and why is it hard to fix?",
    a: "Mode collapse: the generator learns to produce only one (or a few) types of output, ignoring the diversity of the training data. Cause: the generator's only objective is to fool D — once it finds one convincing output, it has no incentive to explore others. Hard to fix because the standard GAN loss provides no diversity signal. Solutions (Wasserstein GAN, minibatch discrimination) modify the objective to penalise low diversity."
  },
  {
    q: "What problem does self-attention solve that RNNs cannot handle well?",
    a: "RNNs process sequences step-by-step — information from early tokens must pass through every intermediate hidden state to reach later ones. Over long sequences this signal degrades (vanishing gradient). Self-attention computes relationships between all token pairs directly in a single operation, so any token can attend to any other token equally regardless of distance."
  },
  {
    q: "What is the role of residual connections and layer normalisation in a transformer block?",
    a: "Residual connections (x + sublayer_output): allow gradients to flow directly through the addition, bypassing the sublayer. This prevents vanishing gradients in deep stacks. Layer normalisation: stabilises the scale of activations after each sublayer, making training more consistent across layers. Together they are what makes transformers trainable at depth (12, 24, 96+ layers)."
  },
  {
    q: "In reinforcement learning, what is the difference between a policy π and a Q-function Q(s, a)?",
    a: "A policy π(s) maps a state directly to an action (or a probability distribution over actions) — it answers 'what should I do now?'. Q(s, a) is the expected cumulative discounted reward from taking action a in state s and then following the policy. Q is a value estimate; π is a decision rule. DQN learns Q, then derives π by always choosing argmax_a Q(s, a)."
  },
  {
    q: "What is the exploration-exploitation tradeoff in reinforcement learning, and how does epsilon-greedy address it?",
    a: "Exploitation: always pick the action with the highest known Q-value — maximises reward given current knowledge, but may miss better actions that haven't been tried. Exploration: take random actions to discover new states and rewards — sacrifices short-term reward for long-term information. Epsilon-greedy: with probability ε take a random action, otherwise exploit. ε decays over time as the agent's knowledge matures."
  },
  {
    q: "Why does DQN use a replay buffer rather than training on each transition immediately?",
    a: "Two reasons. 1. Correlation: consecutive transitions are highly correlated (same environment, similar states). Training on them in order means each update is pulled in a consistent direction — the network overfits to recent experience and forgets earlier states. Random sampling from the buffer breaks these correlations. 2. Efficiency: each transition can be replayed and learned from multiple times, improving sample efficiency."
  }
];

// ── State ─────────────────────────────────────────────────────────────────────
let queue = [];
let currentIdx = 0;
let gotIt = 0, nearly = 0, missedCount = 0;
let missedIndices = [];
let revealed = false;
let isReplay = false;

const root = document.getElementById('game-root');

function showIntro() {
  root.innerHTML = `
    <div class="card intro-card">
      <div class="intro-badge">Flashcard Game</div>
      <div class="intro-title">Course 3 — Keras &amp; TensorFlow</div>
      <div class="intro-meta">
        ${CARDS.length} cards · ~8 minutes<br>
        Covers: why transfer learning works, VAE vs autoencoder, GAN objectives, self-attention, RL concepts.<br>
        Theory-weighted — explain the concept, not just the symptom.
      </div>
      <button class="btn-start" onclick="startGame()">Start →</button>
    </div>`;
}

function startGame() {
  queue = CARDS.map((_, i) => i);
  currentIdx = 0; gotIt = 0; nearly = 0; missedCount = 0;
  missedIndices = []; revealed = false; isReplay = false;
  showCard();
}

function showCard() {
  revealed = false;
  const card = CARDS[queue[currentIdx]];
  const total = queue.length;
  const pct = Math.round((currentIdx / total) * 100);

  root.innerHTML = `
    <div class="q-progress">
      <div class="q-progress-label">
        <span>${isReplay ? 'Replay — ' : ''}Card ${currentIdx + 1} of ${total}</span>
        <div class="score-chips">
          <span class="chip chip-g">✓ ${gotIt}</span>
          <span class="chip chip-y">~ ${nearly}</span>
          <span class="chip chip-r">✗ ${missedCount}</span>
        </div>
      </div>
      <div class="q-bar"><div class="q-bar-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="flash-card" id="flash-card" onclick="revealCard()">
      <div class="flash-face front">
        <div class="face-label">Question</div>
        <div class="face-text">${escHtml(card.q)}</div>
      </div>
      <div class="flash-hint">Click to reveal answer</div>
    </div>

    <div id="assess-area"></div>`;
}

function revealCard() {
  if (revealed) return;
  revealed = true;
  const card = CARDS[queue[currentIdx]];

  document.querySelector('.flash-hint').style.display = 'none';

  const backDiv = document.createElement('div');
  backDiv.className = 'flash-face back';
  backDiv.style.display = 'block';
  backDiv.innerHTML = `<div class="face-label">Answer</div><div class="face-text">${formatAnswer(card.a)}</div>`;
  document.getElementById('flash-card').appendChild(backDiv);

  document.getElementById('assess-area').innerHTML = `
    <div class="assess-bar">
      <button class="assess-btn got-it" onclick="assess('got')">✓ Got it</button>
      <button class="assess-btn nearly" onclick="assess('nearly')">~ Nearly</button>
      <button class="assess-btn missed" onclick="assess('missed')">✗ Missed it</button>
    </div>`;
}

function assess(result) {
  const originalIdx = queue[currentIdx];
  if (result === 'got') gotIt++;
  else if (result === 'nearly') nearly++;
  else { missedCount++; if (!isReplay) missedIndices.push(originalIdx); }

  currentIdx++;
  if (currentIdx >= queue.length) showResults();
  else showCard();
}

// ── XP toast ──────────────────────────────────────────────
function showXPToast(xp) {
  var el = document.getElementById('xp-toast');
  if (!el) { el = document.createElement('div'); el.id = 'xp-toast'; document.body.appendChild(el); }
  el.textContent = '+' + xp + ' XP';
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2200);
}
function showResults() {
  // ── XP award ──
  var _xp = gotIt * 10 + nearly * 5;
  if (_xp > 0 && typeof engine !== 'undefined') {
    engine.addXP(_xp, 'ibm');
    showXPToast(_xp);
    if (typeof sync !== 'undefined' && sync.isConfigured()) {
      sync.push().catch(function(){});
    }
  }
  const total = gotIt + nearly + missedCount;
  const replayBtn = missedIndices.length > 0
    ? `<button class="btn-action primary" onclick="startReplay()">Replay ${missedIndices.length} missed</button>`
    : '';

  let histHtml = '';
  if (!isReplay) {
    const histKey = 'VLE_scores_c03_flashcards';
    let hist = JSON.parse(localStorage.getItem(histKey) || '[]');
    hist.unshift({got: gotIt, total: total});
    if (hist.length > 3) hist = hist.slice(0, 3);
    localStorage.setItem(histKey, JSON.stringify(hist));
    if (hist.length > 1) {
      histHtml = '<div style="font-size:.8rem;color:var(--muted);margin-top:.5rem">Previous: '
        + hist.slice(1).map(function(h) { return 'Got ' + h.got + '/' + h.total; }).join(' · ')
        + '</div>';
    }
  }

  root.innerHTML = `
    <div class="card intro-card">
      <div class="intro-title" style="margin-bottom:1rem">Session complete</div>
      <div class="result-row">
        <div class="result-badge g"><div class="rnum">${gotIt}</div><div class="rlbl">Got it</div></div>
        <div class="result-badge y"><div class="rnum">${nearly}</div><div class="rlbl">Nearly</div></div>
        <div class="result-badge r"><div class="rnum">${missedCount}</div><div class="rlbl">Missed</div></div>
      </div>
      <div class="intro-meta">${sessionMsg(gotIt, total)}${histHtml}</div>
      <div class="results-actions">
        ${replayBtn}
        <button class="btn-action" onclick="startGame()">Restart</button>
        <a class="btn-action" href="index.html">← Games Hub</a>
        <a class="btn-action" href="../courses/c03.html">← Back to C3</a>
        <a class="btn-action" href="c03-quiz.html">Try the quiz →</a>
      </div>
    </div>`;
}

function startReplay() {
  queue = [...missedIndices];
  currentIdx = 0; gotIt = 0; nearly = 0; missedCount = 0;
  missedIndices = []; revealed = false; isReplay = true;
  showCard();
}

function sessionMsg(got, total) {
  const pct = total > 0 ? got / total : 0;
  if (pct >= 0.8) return "Solid — the concepts are landing. Move to the quiz to test discrimination.";
  if (pct >= 0.5) return "Good start — replay the missed cards, then try the quiz.";
  return "These concepts need more time. Replay the missed cards. Check the Practical Notes in C3 for the details.";
}

function formatAnswer(text) {
  return escHtml(text).replace(/`([^`]+)`/g, '<code>$1</code>');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

showIntro();
</script>
</body>
</html>
