  <style>
    #xp-toast { position:fixed; bottom:1.5rem; right:1.5rem; z-index:999;
      background:#d29922; color:#0d1117; font-size:.85rem; font-weight:700;
      padding:.5rem 1rem; border-radius:99px; opacity:0; pointer-events:none;
      transition:opacity .3s ease; }
    #xp-toast.show { opacity:1; }
  </style>
  <style>
    .game-shell { max-width: 680px; margin: 0 auto; }

    .intro-card { text-align:center; padding:2.5rem 2rem; }
    .intro-badge { display:inline-block; font-size:.75rem; font-weight:700; text-transform:uppercase;
      letter-spacing:.08em; padding:.3rem .75rem; border-radius:99px;
      background:rgba(163,113,247,.1); color:#a371f7;
      border:1px solid rgba(163,113,247,.3); margin-bottom:1.25rem; }
    .intro-title { font-size:1.3rem; font-weight:700; letter-spacing:-.02em; margin-bottom:.5rem; }
    .intro-meta { color:var(--muted); font-size:.875rem; margin-bottom:1.75rem; line-height:1.6; }
    .btn-start { padding:.65rem 2rem; border-radius:8px;
      background:#a371f7; color:#fff; font-weight:600; font-size:.9rem;
      border:none; cursor:pointer; transition:opacity .15s; }
    .btn-start:hover { opacity:.85; }

    .q-progress { margin-bottom:1.25rem; }
    .q-progress-label { display:flex; justify-content:space-between; font-size:.78rem;
      color:var(--muted); margin-bottom:.35rem; }
    .q-bar { height:4px; background:var(--surface2); border-radius:99px; overflow:hidden; }
    .q-bar-fill { height:100%; background:#a371f7; border-radius:99px; transition:width .3s ease; }
    .score-chips { display:flex; gap:.5rem; }
    .chip { font-size:.75rem; font-weight:700; padding:.15rem .55rem; border-radius:99px; }
    .chip-g { background:var(--green-bg); color:var(--green); }
    .chip-r { background:rgba(248,81,73,.1); color:var(--red); }

    .q-card { background:var(--surface); border:1px solid var(--border); border-radius:12px;
      padding:1.75rem; margin-bottom:1rem; }
    .q-label { font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em;
      color:#a371f7; margin-bottom:.75rem; }
    .q-text { font-size:1rem; font-weight:600; line-height:1.5; margin-bottom:1.25rem; }

    .options-grid { display:grid; grid-template-columns:1fr 1fr; gap:.625rem; }
    .opt-btn { padding:.9rem 1rem; border-radius:8px; font-size:.9rem; font-weight:500;
      border:1.5px solid var(--border); background:var(--surface2); color:var(--text);
      cursor:pointer; text-align:left; line-height:1.4; transition:border-color .12s, background .12s; }
    .opt-btn:hover:not(:disabled) { border-color:#a371f7; background:rgba(163,113,247,.07); }
    .opt-btn.correct  { border-color:var(--green)!important; background:var(--green-bg)!important; color:var(--green)!important; font-weight:700; }
    .opt-btn.wrong    { border-color:var(--red)!important;   background:rgba(248,81,73,.08)!important; color:var(--red)!important; }
    .opt-btn.dimmed   { opacity:.35; }
    .opt-btn:disabled { cursor:default; }

    .explanation { margin-top:1rem; padding:1rem 1.25rem; border-radius:8px;
      background:var(--surface2); border-left:3px solid #a371f7;
      font-size:.875rem; line-height:1.6; color:var(--text); display:none; }
    .explanation code { background:var(--surface); padding:.1em .35em; border-radius:4px;
      font-size:.85em; color:var(--blue); font-family:"SFMono-Regular",Consolas,monospace; }

    .btn-next { margin-top:1rem; padding:.6rem 1.5rem; border-radius:8px;
      background:#a371f7; color:#fff; font-weight:600; font-size:.875rem;
      border:none; cursor:pointer; transition:opacity .15s; display:none; }
    .btn-next:hover { opacity:.85; }

    .result-row { display:flex; gap:.75rem; justify-content:center; flex-wrap:wrap; margin-bottom:1.5rem; }
    .result-badge { text-align:center; padding:1rem 1.5rem; border-radius:10px; min-width:90px; }
    .result-badge .rnum { font-size:2rem; font-weight:700; }
    .result-badge .rlbl { font-size:.75rem; font-weight:600; text-transform:uppercase;
      letter-spacing:.06em; margin-top:.2rem; }
    .result-badge.g { background:var(--green-bg); color:var(--green); }
    .result-badge.r { background:rgba(248,81,73,.08); color:var(--red); }
    .results-actions { display:flex; gap:.75rem; justify-content:center; flex-wrap:wrap; margin-top:1.25rem; }
    .btn-action { padding:.55rem 1.25rem; border-radius:8px; font-size:.875rem; font-weight:600;
      cursor:pointer; border:1px solid var(--border); background:var(--surface2);
      color:var(--text); text-decoration:none; transition:border-color .12s; }
    .btn-action:hover { border-color:#a371f7; color:#a371f7; }
    .btn-action.primary { background:#a371f7; border-color:#a371f7; color:#fff; }
    .btn-action.primary:hover { opacity:.85; }
  </style>

<body>
<script>initNav('../'); localStorage.setItem('VLE_lastGame', 'C4 Odd One Out — PyTorch');</script>

<div class="container">
  <div class="game-shell">

    <div style="margin-bottom:1.25rem">
      <div class="tag" style="background:rgba(163,113,247,.1);color:#a371f7;border:1px solid rgba(163,113,247,.3);margin-bottom:.4rem">
        Study Game · Odd One Out
      </div>
      <h1 style="font-size:1.3rem;font-weight:700;letter-spacing:-.02em">C4 Odd One Out — Neural Networks &amp; PyTorch</h1>
    </div>

    <div id="game-root"></div>

  </div>
</div>

<script>
const QUESTIONS = [
  {
    prompt: "Which of these is NOT a step in the standard PyTorch training loop?",
    options: ["optimizer.zero_grad()", "model.compile()", "loss.backward()", "optimizer.step()"],
    oddIndex: 1,
    explanation: "model.compile() is a Keras method — it configures a model with an optimizer, loss function, and metrics before training. PyTorch has no equivalent; you configure these objects yourself. The standard PyTorch training loop steps are: zero_grad() (clear accumulated gradients), forward pass (model(X)), loss.backward() (compute gradients), and optimizer.step() (update weights)."
  },
  {
    prompt: "Which of these does model.eval() NOT affect?",
    options: ["Dropout behaviour", "BatchNorm statistics source", "Whether a computation graph is built", "Determinism of model output"],
    oddIndex: 2,
    explanation: "Whether a computation graph is built is controlled by torch.no_grad() — not model.eval(). model.eval() changes layer behaviour: Dropout passes all activations through unchanged (rather than randomly zeroing them), and BatchNorm uses its stored running statistics instead of computing new ones from the current batch. You need both model.eval() and torch.no_grad() during inference — for different, independent reasons."
  },
  {
    prompt: "Which of these does NOT belong to PyTorch's autograd system?",
    options: ["requires_grad=True", "tensor.backward()", "tensor.grad", "optimizer.step()"],
    oddIndex: 3,
    explanation: "optimizer.step() belongs to the optimiser, not to autograd. Autograd is PyTorch's automatic differentiation engine: requires_grad=True marks a tensor for gradient tracking; .backward() traverses the computation graph to compute ∂loss/∂w via the chain rule; and .grad stores those accumulated gradients. The optimiser is a separate system that reads .grad and applies the weight update rule — it's a consumer of autograd's output."
  },
  {
    prompt: "Which of these is NOT inside nn.CrossEntropyLoss?",
    options: ["LogSoftmax", "NLLLoss", "Sigmoid", "Implicit conversion from logits to log-probabilities"],
    oddIndex: 2,
    explanation: "Sigmoid is not part of nn.CrossEntropyLoss — it belongs to binary classification. CrossEntropyLoss = LogSoftmax + NLLLoss. It applies LogSoftmax (log of softmax probabilities) to convert raw logits into log-probabilities, then NLLLoss picks out the log-probability for the true class and negates it. Your model's output must be raw logits — no softmax or sigmoid."
  },
  {
    prompt: "Which of these belongs to Dataset, NOT DataLoader?",
    options: ["Batching samples into tensors", "Shuffling order each epoch", "Returning a single sample by index", "Parallel loading with num_workers"],
    oddIndex: 2,
    explanation: "Returning a single sample by index is the Dataset's responsibility — specifically its __getitem__(idx) method. A Dataset only needs to implement __len__ and __getitem__. DataLoader wraps a Dataset and adds all the training infrastructure: batching (stacking __getitem__ outputs), shuffling (random order per epoch), parallel loading (num_workers background workers), and collation (turning a list of samples into a batch tensor)."
  },
  {
    prompt: "Which of these is NOT true of saving a model with state_dict()?",
    options: ["Returns a dict mapping layer names to parameter tensors", "Is the preferred portable save format", "Saves the model architecture alongside weights", "Requires loading into a pre-constructed model instance"],
    oddIndex: 2,
    explanation: "state_dict() saves only the weights — a dictionary of {layer_name: tensor}. It does NOT save the model architecture. To restore the model you must: (1) construct the model separately (model = MyModel(...)), then (2) call model.load_state_dict(torch.load('weights.pt')). Saving the full model with pickle does bundle architecture and weights, but it breaks when you rename or move the class, or change Python/PyTorch versions."
  },
  {
    prompt: "Which of these does torch.no_grad() NOT do?",
    options: ["Prevents computation graph building", "Reduces memory usage during evaluation", "Disables Dropout layers", "Speeds up the forward pass"],
    oddIndex: 2,
    explanation: "Disabling Dropout is done by model.eval() — not torch.no_grad(). torch.no_grad() tells PyTorch not to build the computation graph or store intermediate activations for backpropagation. This saves significant memory (no graph nodes to store) and speeds up the forward pass. Dropout and BatchNorm behaviour are completely unaffected by torch.no_grad() — you must call model.eval() separately."
  },
  {
    prompt: "Which of these is NOT a reason to prefer BCEWithLogitsLoss over sigmoid + BCELoss?",
    options: ["Numerically stable for large input values", "Avoids log(0) from a saturated sigmoid", "Uses the log-sum-exp trick internally", "Accepts probability inputs directly"],
    oddIndex: 3,
    explanation: "BCEWithLogitsLoss expects raw logits — the opposite of accepting probabilities directly. That's its whole advantage: it fuses sigmoid and BCE into a single expression, avoiding the case where sigmoid outputs exactly 0.0 or 1.0 for large inputs, making log(0) = −∞ and the loss undefined. The fused log-sum-exp form computes the same result but remains numerically stable for any finite logit."
  },
  {
    prompt: "Which of these is NOT true of gradient accumulation?",
    options: ["Simulates a larger effective batch size", "Useful when GPU memory cannot fit large batches", "Gives each micro-batch its own separate weight update", "Accumulates gradients across N forward passes before stepping"],
    oddIndex: 2,
    explanation: "Giving each micro-batch its own weight update is exactly what gradient accumulation avoids. The pattern is: forward N small batches without calling optimizer.step(), letting gradients accumulate in .grad across all N passes, then call step() once. The weights are updated only after N batches — making the effective batch size N× larger. If you stepped after each micro-batch, that would just be normal mini-batch training, not accumulation."
  },
  {
    prompt: "Which container does NOT register submodule parameters in model.parameters()?",
    options: ["nn.ModuleList", "nn.ModuleDict", "A plain Python list", "nn.Sequential"],
    oddIndex: 2,
    explanation: "A plain Python list is invisible to PyTorch's module registration system. PyTorch discovers parameters by scanning a module's attributes for registered nn.Module instances. nn.ModuleList, nn.ModuleDict, and nn.Sequential all register their contents properly — their parameters appear in model.parameters(), model.state_dict(), and are moved by .to(device). A plain list stores modules as a regular Python object; PyTorch never sees them."
  }
];

let currentIdx = 0;
let correct = 0;
let wrong = 0;
let answered = false;
let activeQuestions = [];

const root = document.getElementById('game-root');

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildActiveQuestions() {
  return shuffle(QUESTIONS).map(q => {
    const oddOption = q.options[q.oddIndex];
    const shuffledOptions = shuffle(q.options);
    return {
      ...q,
      options: shuffledOptions,
      oddIndex: shuffledOptions.indexOf(oddOption)
    };
  });
}

function showIntro() {
  root.innerHTML = `
    <div class="card intro-card">
      <div class="intro-badge">Odd One Out</div>
      <div class="intro-title">Course 4 — Neural Networks &amp; PyTorch</div>
      <div class="intro-meta">
        ${QUESTIONS.length} questions · ~6 minutes<br>
        Four items — pick the one that doesn't belong.<br>
        Tests category discrimination: autograd, training loop, loss functions, DataLoader, model saving.
      </div>
      <button class="btn-start" onclick="startGame()">Start →</button>
    </div>`;
}

function startGame() {
  currentIdx = 0; correct = 0; wrong = 0;
  activeQuestions = buildActiveQuestions();
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = activeQuestions[currentIdx];
  const pct = Math.round((currentIdx / activeQuestions.length) * 100);

  root.innerHTML = `
    <div class="q-progress">
      <div class="q-progress-label">
        <span>Question ${currentIdx + 1} of ${activeQuestions.length}</span>
        <div class="score-chips">
          <span class="chip chip-g">✓ ${correct}</span>
          <span class="chip chip-r">✗ ${wrong}</span>
        </div>
      </div>
      <div class="q-bar"><div class="q-bar-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="q-card">
      <div class="q-label">Odd One Out</div>
      <div class="q-text">${escHtml(q.prompt)}</div>
      <div class="options-grid" id="options">
        ${q.options.map((opt, i) =>
          `<button class="opt-btn" id="opt-${i}" onclick="pick(${i})">${escHtml(opt)}</button>`
        ).join('')}
      </div>
      <div class="explanation" id="explanation">${formatText(q.explanation)}</div>
    </div>

    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Next →</button>`;
}

function pick(idx) {
  if (answered) return;
  answered = true;

  const q = activeQuestions[currentIdx];
  const isCorrect = idx === q.oddIndex;
  if (isCorrect) correct++; else wrong++;

  q.options.forEach((_, i) => {
    const btn = document.getElementById(`opt-${i}`);
    btn.disabled = true;
    if (i === q.oddIndex) {
      btn.classList.add('correct');
    } else if (i === idx && !isCorrect) {
      btn.classList.add('wrong');
    } else {
      btn.classList.add('dimmed');
    }
  });

  document.getElementById('explanation').style.display = 'block';
  document.getElementById('btn-next').style.display = 'inline-block';
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= activeQuestions.length) showResults();
  else showQuestion();
}

// ── XP toast ──────────────────────────────────────────────
function showXPToast(xp) {
  var el = document.getElementById('xp-toast');
  if (!el) { el = document.createElement('div'); el.id = 'xp-toast'; document.body.appendChild(el); }
  el.textContent = '+' + xp + ' XP';
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2200);
}
function showResults() {
  // ── XP award ──
  var _xp = correct * 4;
  if (_xp > 0 && typeof engine !== 'undefined') {
    engine.addXP(_xp, 'ibm');
    showXPToast(_xp);
    if (typeof sync !== 'undefined' && sync.isConfigured()) {
      sync.push().catch(function(){});
    }
  }
  const total = activeQuestions.length;
  const pct = correct / total;
  let msg;
  if (pct >= 0.9) msg = "Sharp — you can reliably separate PyTorch concepts. Assessment-ready for this material.";
  else if (pct >= 0.7) msg = "Good discrimination. Review the explanations for the ones you missed.";
  else msg = "These category distinctions need more work — replay and read each explanation carefully.";

  const histKey = 'VLE_scores_c04_ooo';
  let hist = JSON.parse(localStorage.getItem(histKey) || '[]');
  hist.unshift({score: correct, total: total});
  if (hist.length > 3) hist = hist.slice(0, 3);
  localStorage.setItem(histKey, JSON.stringify(hist));
  const histHtml = hist.length > 1
    ? '<div style="font-size:.8rem;color:var(--muted);margin-top:.5rem">Previous: '
      + hist.slice(1).map(function(h) { return h.score + '/' + h.total; }).join(' · ')
      + '</div>'
    : '';

  root.innerHTML = `
    <div class="card intro-card">
      <div class="intro-title" style="margin-bottom:1rem">Session complete</div>
      <div class="result-row">
        <div class="result-badge g"><div class="rnum">${correct}</div><div class="rlbl">Correct</div></div>
        <div class="result-badge r"><div class="rnum">${wrong}</div><div class="rlbl">Wrong</div></div>
      </div>
      <div class="intro-meta">${msg}${histHtml}</div>
      <div class="results-actions">
        <button class="btn-action primary" onclick="startGame()">Play again</button>
        <a class="btn-action" href="index.html">← Games Hub</a>
        <a class="btn-action" href="../courses/c04.html">← Back to C4</a>
        <a class="btn-action" href="c04-true-false.html">True/False sprint →</a>
      </div>
    </div>`;
}

function formatText(text) {
  return text.replace(/`([^`]+)`/g, '<code>$1</code>');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

showIntro();
</script>
</body>
</html>
