      "It should return all samples from idx onward as a list — DataLoader uses this to prefetch and cache the entire next batch before it's needed"
    ],
    correct: 1,
    explanation: "__getitem__ returns exactly one sample by index. Batching, shuffling, and parallel loading are DataLoader's job. If you batch inside __getitem__, DataLoader stacks already-batched tensors and produces an extra unwanted dimension. Division of labour: Dataset gets one item; DataLoader assembles many items into batches efficiently."
  },
  {
    question: "Validation accuracy fluctuates significantly between identical runs on the same data. The model has Dropout(p=0.5). What is the cause?",
    context: null,
    options: [
      "The validation dataset is too small — with fewer than 500 samples, per-class accuracy estimates have enough variance to fluctuate significantly",
      "model.eval() was not called — Dropout still randomly drops units on each forward pass",
      "p=0.5 is too aggressive — reducing to p=0.1 eliminates enough randomness for validation metrics to become near-reproducible",
      "torch.no_grad() disables Dropout by suppressing the random masking operation — it should not be used during validation passes"
    ],
    correct: 1,
    explanation: "model.eval() switches Dropout to pass-through mode (no dropping) and fixes BatchNorm statistics. Without it, every forward pass drops a different random 50% of activations — the model's output is stochastic, making validation metrics non-reproducible and artificially degraded. Always call model.eval() before the validation loop."
  },
  {
    question: "Why must data augmentation (RandomHorizontalFlip, RandomCrop) be applied to training data only, not validation?",
    context: null,
    options: [
      "Augmentation transforms like RandomCrop add 30–50% per-epoch latency — applying them to the validation set makes evaluation unacceptably slow",
      "Random augmentation alters the pixel content that generated the ground-truth label — a flipped image may no longer match its original class annotation",
      "Random transforms make validation metrics non-reproducible and measure augmented data, not real-world performance",
      "DataLoader's transform parameter is only supported for training datasets — passing transforms to a validation DataLoader raises a TypeError at runtime"
    ],
    correct: 2,
    explanation: "Augmentation is a training regularisation technique — it artificially expands the training distribution. Validation should measure performance on real, unmodified data. Random augmentation also makes validation metrics non-reproducible (different result each run). Standard split: training set gets augmentation + normalisation; val/test gets normalisation only."
  }
];

const GAME_SIZE = 10;

let queue = [];
let currentIdx = 0;
let missedIndices = [];
let score = 0;
let isReplay = false;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQueue(indices) {
  return indices.map(qi => {
    const q = QUESTIONS[qi];
    const correctText = q.options[q.correct];
    const shuffled = shuffle([...q.options]);
    return { ...q, options: shuffled, correct: shuffled.indexOf(correctText), _qi: qi };
  });
}

const root = document.getElementById('game-root');

function showIntro() {
  root.innerHTML = `
    <div class="card intro-card">
      <div class="intro-badge">Multiple Choice Quiz</div>
      <div class="intro-title">Course 4 — Introduction to Neural Networks &amp; PyTorch</div>
      <div class="intro-meta">
        10 questions per session · 25-question pool · ~5 minutes<br>
        Covers: training loop, autograd, loss functions, modules, DataLoaders, common pitfalls.<br>
        <strong>Shuffled options · Immediate feedback</strong> after every question.
      </div>
      <button class="btn-start" onclick="startQuiz()">Start Quiz →</button>
    </div>`;
}

function startQuiz() {
  const pool = shuffle(QUESTIONS.map((_, i) => i)).slice(0, GAME_SIZE);
  queue = buildQueue(pool);
  currentIdx = 0; missedIndices = []; score = 0; isReplay = false;
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = queue[currentIdx];
  const total = queue.length;
  const pct = Math.round((currentIdx / total) * 100);
  const letters = ['A','B','C','D'];

  const contextHtml = q.context
    ? `<div class="q-context"><pre><code>${escHtml(q.context)}</code></pre></div>`
    : '';

  const optionsHtml = q.options.map((opt, i) => `
    <button class="option-btn" id="opt-${i}" onclick="selectOption(${i})">
      <span class="option-letter">${letters[i]}</span>
      <span>${escHtml(opt)}</span>
    </button>`).join('');

  root.innerHTML = `
    <div class="q-progress">
      <div class="q-progress-label">
        <span>${isReplay ? 'Replay — ' : ''}Question ${currentIdx + 1} of ${total}</span>
        <span class="score-chip">✓ ${score}</span>
      </div>
      <div class="q-bar"><div class="q-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="card" style="margin-bottom:1rem">
      ${contextHtml}
      <div class="q-text">${escHtml(q.question)}</div>
      <div class="options">${optionsHtml}</div>
      <div class="feedback" id="feedback"></div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">Next →</button>
    </div>`;
}

function selectOption(chosen) {
  if (answered) return;
  answered = true;
  const q = queue[currentIdx];
  const isCorrect = chosen === q.correct;

  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === chosen && !isCorrect) btn.classList.add('wrong');
    else btn.classList.add('dimmed');
  });

  if (isCorrect) score++;
  else if (!isReplay) missedIndices.push(q._qi);

  const fb = document.getElementById('feedback');
  fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
  fb.style.display = 'block';
  fb.innerHTML = `<div class="feedback-head">${isCorrect ? '✓ Correct' : '✗ Incorrect'}</div>${escHtml(q.explanation)}`;
  document.getElementById('btn-next').style.display = 'inline-block';
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= queue.length) showResults();
  else showQuestion();
}

function showResults() {
  const total = queue.length;
  const pct = Math.round((score / total) * 100);
  const ringClass = pct >= 80 ? 'great' : pct >= 60 ? 'ok' : 'retry';
  const msg = pct >= 80
    ? 'The PyTorch fundamentals are solid.'
    : pct >= 60
    ? 'Getting there — review the explanations for what you missed.'
    : 'The training loop details need more work. Review Core Theory in C4 notes.';

  let histHtml = '';
  if (!isReplay) {
    const histKey = 'VLE_scores_c04_quiz';
    let hist = JSON.parse(localStorage.getItem(histKey) || '[]');
    hist.unshift({score: score, total: total});
    if (hist.length > 3) hist = hist.slice(0, 3);
    localStorage.setItem(histKey, JSON.stringify(hist));
    if (hist.length > 1) {
      histHtml = '<div style="font-size:.8rem;color:var(--muted);margin-top:.5rem">Previous: '
        + hist.slice(1).map(function(h) { return h.score + '/' + h.total; }).join(' · ')
        + '</div>';
    }
  }

  const replayBtn = missedIndices.length > 0
    ? `<button class="btn-action primary" onclick="startReplay()">Replay ${missedIndices.length} missed</button>` : '';

  root.innerHTML = `
    <div class="card intro-card">
      <div class="score-ring ${ringClass}">${score}/${total}</div>
      <div class="intro-title" style="margin-bottom:.5rem">${pct}%</div>
      <div class="intro-meta">${msg}${histHtml}</div>
      <div class="results-actions">
        ${replayBtn}
        <button class="btn-action" onclick="startQuiz()">New session</button>
        <a class="btn-action" href="index.html">← Games Hub</a>
        <a class="btn-action" href="../courses/c04.html">← Back to C4</a>
      </div>
    </div>`;
}

function startReplay() {
  queue = buildQueue([...missedIndices]);
  currentIdx = 0; missedIndices = []; score = 0; isReplay = true;
  showQuestion();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

showIntro();
</script>
