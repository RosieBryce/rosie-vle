<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rosie's VLE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -.03em; margin-bottom: .5rem; }
    p { color: #8b949e; font-size: .9rem; margin-bottom: 2rem; }
    .domains { display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 400px; }
    a.domain-card {
      display: flex; align-items: center; gap: 1rem;
      padding: 1.25rem 1.5rem;
      border: 1px solid #21262d;
      border-radius: 10px;
      background: #161b22;
      text-decoration: none;
      color: #e6edf3;
      font-weight: 600;
      font-size: 1rem;
      transition: border-color .15s;
    }
    a.domain-card:hover { border-color: #58a6ff; }
    .icon { font-size: 1.5rem; }
    .meta { font-size: .8rem; color: #8b949e; font-weight: 400; margin-top: .2rem; }
    .coming-soon {
      margin-top: 2.5rem;
      font-size: .78rem;
      color: #484f58;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Rosie's VLE</h1>
  <p>Command Centre — coming soon</p>

  <div class="domains">
    <a class="domain-card" href="ibm/index.html">
      <span class="icon">🤖</span>
      <div>
        IBM AI Engineering
        <div class="meta">Active · deadline Jul 31 2026</div>
      </div>
    </a>
    <a class="domain-card" href="swedish/index.html">
      <span class="icon">🫎</span>
      <div>
        Swedish
        <div class="meta">Active</div>
      </div>
    </a>
  </div>

  <a class="domain-card" href="sr/queue.html" style="border-color:#6e40c9;margin-top:.5rem">
    <span class="icon">🃏</span>
    <div>
      SR Queue
      <div class="meta">Spaced repetition · all domains</div>
    </div>
  </a>

  <p class="coming-soon" style="margin-top:1.5rem">
    Full command centre coming in Phase 6 ·
    <a href="sync-setup.html" style="color:#58a6ff">Set up sync ↗</a>
  </p>
</body>
</html>
